    catch(e) { return {}; }
  }

  /* ── format pct pill ────────────────────────────────── */
  function pctPill(pct) {
    var up  = pct >= 0;
    var clr = up ? '#22c55e' : '#ef4444';
    var bg  = up ? '#22c55e18' : '#ef444418';
    var arrow = up ? '↑' : '↓';
    return '<span style="display:inline-flex;align-items:center;gap:2px;' +
      'background:' + bg + ';color:' + clr + ';border:1px solid ' + clr + '44;' +
      'border-radius:5px;padding:1px 7px;font-weight:700;font-size:12px;white-space:nowrap;">' +
      arrow + Math.abs(pct).toFixed(2) + '%</span>';
  }

  /* ── main enhancer (runs after every React render) ─── */
  function enhance() {
    var tbl = document.querySelector('table');
    if (!tbl) return;

    var state    = getState();
    var prices   = state.prices   || {};
    var prevClose = loadPrevClose();

    /* ── add "% יום" TH if missing ─────────────────── */
    var thead = tbl.querySelector('thead tr');
    if (thead && !thead.querySelector('[data-pp18-hdr]')) {
      var th = document.createElement('th');
      th.setAttribute('data-pp18-hdr', '1');
      th.textContent = '% יום';
      th.style.cssText = 'padding:6px 10px;font-size:12px;color:#94a3b8;text-align:right;white-space:nowrap;';
      thead.appendChild(th);
    }

    /* ── enhance each tbody row ─────────────────────── */
    var rows = tbl.querySelectorAll('tbody tr');
    rows.forEach(function(row) {
      var cells = row.querySelectorAll('td');
      if (!cells.length) return;

      /* ── symbol cell: add badge + company name ───── */
      var symCell = cells[0];
      var raw = symCell.textContent.trim().toUpperCase()
                       .replace(/[^A-Z0-9.]/g, '');
      var co = CO[raw];

      if (co && !symCell.querySelector('[data-pp18-badge]')) {
        var color = co[1], cname = co[0];

        symCell.innerHTML =
          '<div style="display:flex;flex-direction:column;gap:2px;">' +
            '<div style="display:flex;align-items:center;gap:6px;">' +
              '<span data-pp18-badge="1" style="' +
                'display:inline-block;background:' + color + ';color:#fff;' +
                'font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;' +
                'letter-spacing:.04em;cursor:pointer;" ' +
                'onclick="window.open(\'https://www.tradingview.com/chart/?symbol=' + raw + '\',\'_blank\')">' +
                raw +
              '</span>' +
            '</div>' +
            '<div style="font-size:11px;color:#64748b;margin-top:1px;">' + cname + '</div>' +
          '</div>';
      }

      /* ── day % cell: add/update ─────────────────── */
      var existingPct = row.querySelector('[data-pp18-pct]');

      var p  = prices[raw];
      var pc = prevClose[raw];
      var pct = (p && pc && pc !== 0) ? (p - pc) / pc * 100 : null;

      if (existingPct) {
        /* update value in-place */
        existingPct.innerHTML = pct !== null ? pctPill(pct) : '<span style="color:#475569">—</span>';
      } else {
        var td = document.createElement('td');
        td.setAttribute('data-pp18-pct', '1');
        td.style.cssText = 'text-align:right;padding:6px 10px;white-space:nowrap;vertical-align:middle;';
        td.innerHTML = pct !== null ? pctPill(pct) : '<span style="color:#475569">—</span>';
        row.appendChild(td);
      }
    });
  }

  /* ── MutationObserver (debounced) ───────────────────── */
  var _deb18 = null;
  new MutationObserver(function() {
    clearTimeout(_deb18);
    _deb18 = setTimeout(enhance, 300);
  }).observe(document.body, { childList: true, subtree: true });

  /* ── re-run when prices or prevClose update ─────────── */
  window.addEventListener('storage', function(e) {
    if (e.key === 'primo_portfolio_v6' || e.key === 'primo_prevclose_v1') {
      clearTimeout(_deb18);
      _deb18 = setTimeout(enhance, 100);
    }
  });

  setTimeout(enhance, 3500);

})();
</script>

<!-- ================================================================
     Feature Patch v19 — Alerts Standalone Component
     Injects "🔔 התראות" as a full main-nav tab with its own page.
     ================================================================ -->
<style>
  /* ── alerts panel overlay ─────────────────────── */
  #pp-alerts-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: hsl(222,20%,6%);
    z-index: 10000;
    overflow-y: auto;
    direction: rtl;
  }
  #pp-alerts-overlay.pp-alerts-active { display: block; }

  /* cards */
  .pp-alc {
    background: hsl(222,14%,10%);
    border: 1px solid hsl(222,14%,18%);
    border-right: 3px solid;
    border-radius: 5px;
    padding: 11px 14px;
    margin-bottom: 9px;
    direction: rtl;
    transition: background .12s;
  }
  .pp-alc:hover { background: hsl(222,14%,12%); }
  .pp-alc.dir-up      { border-right-color: #34d399; }
  .pp-alc.dir-down    { border-right-color: #f87171; }
  .pp-alc.dir-neutral { border-right-color: #64748b; }
  .pp-alc-top   { display:flex;align-items:center;justify-content:space-between;margin-bottom:3px; }
  .pp-alc-left  { display:flex;align-items:center;gap:7px; }
  .pp-alc-sym   { font-weight:700;font-size:16.2px;color:#00d4ff;text-decoration:none;transition:color .15s; }
  .pp-alc-sym:hover { color:#67e8f9; text-decoration:underline; }
  .pp-alc-title { font-weight:700;font-size:14.8px; }
  .pp-alc-badge { font-size:11px;font-weight:700;padding:1px 7px;border-radius:3px;white-space:nowrap; }
  .pp-alc-msg   { font-size:13.5px;color:#94a3b8;line-height:1.45; }

  /* new/unread blink */
  @keyframes pp-alc-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.45; }
  }
  .pp-alc.pp-alc-new { animation: pp-alc-pulse 1.6s ease-in-out infinite; cursor: pointer; }

  /* nav button */
  #pp-alerts-navbtn {
    position: relative;
    white-space: nowrap;
    cursor: pointer;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  #pp-alerts-navbtn.pp-alerts-navactive {
    color: #f87171 !important;
    border-bottom-color: #f87171 !important;
  }
  #pp-alerts-navbtn .pp-badge {
    position: absolute;
    top: 2px; left: 2px;
    min-width: 16px; height: 16px;
    background: #f87171;
    color: #fff;
    font-size: 10px; font-weight: 700;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
    line-height: 1;
  }
  /* scrollbar inside overlay */
  #pp-alerts-list::-webkit-scrollbar       { width: 4px; }
  #pp-alerts-list::-webkit-scrollbar-track { background: transparent; }
  #pp-alerts-list::-webkit-scrollbar-thumb { background: hsl(222,14%,26%); border-radius: 2px; }
</style>

<script>
/* =======================================================
   Primo Portfolio Feature Patch v19
   Alerts — standalone main-nav tab
   ======================================================= */
(function () {
  'use strict';

  var PANEL_ID    = 'pp-alerts-overlay';
  var NAVBTN_ID   = 'pp-alerts-navbtn';
  var LIST_ID     = 'pp-alerts-list';
  var REFRESH_MS  = 300000;   // 5 min auto-refresh
  var _injected   = false;
  var _loaded     = false;
  var _refreshTmr = null;

  var SEV_COLOR  = { high: '#f87171', medium: '#fb923c', low: '#60a5fa' };
  var SEV_HE     = { high: 'גבוה',    medium: 'בינוני',  low: 'נמוך'   };
  var DIR_COLOR  = { up: '#34d399', down: '#f87171', neutral: '#64748b' };
  var TYPE_ICON  = {
    price_move: '📈', ma200_cross: '📉', ma200w_cross: '🔻',
    drawdown: '⬇️', '52w_high': '🏆', revenue_trend: '📊',
    earnings: '📅', concentration: '⚖️'
  };
  var HIST_KEY    = 'pp_alert_hist_v1';
  var ONE_HOUR_MS = 3600000;

  /* ── history helpers ─────────────────────────────── */
  function alertId(a) { return (a.symbol || '') + '|' + (a.type || ''); }

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HIST_KEY) || '{}'); } catch(e) { return {}; }
  }
  function saveHistory(h) {
    try { localStorage.setItem(HIST_KEY, JSON.stringify(h)); } catch(e) {}
  }

  function startOfDay(ts) {
    var d = new Date(ts); d.setHours(0,0,0,0); return d.getTime();
  }
  function startOfWeek(ts) {
    var d = new Date(ts); d.setHours(0,0,0,0); d.setDate(d.getDate() - d.getDay()); return d.getTime();
  }

  function mergeAlerts(freshAlerts) {
    var now  = Date.now();
    var hist = loadHistory();
    var expireThreshold = startOfWeek(now) - 7 * 86400000;
    freshAlerts.forEach(function(a) {
      var id = alertId(a);
      if (!hist[id]) hist[id] = { firstSeen: now, alert: a };
      else           hist[id].alert = a;
    });
    Object.keys(hist).forEach(function(id) {
      if (hist[id].firstSeen < expireThreshold) delete hist[id];
    });
    saveHistory(hist);
    return hist;
  }

  function bucketize(hist) {
    var now            = Date.now();
    var todayStart     = startOfDay(now);
    var yesterdayStart = todayStart - 86400000;
    var thisWeekStart  = startOfWeek(now);
    var lastWeekStart  = thisWeekStart - 7 * 86400000;
    var bkts = { today: [], yesterday: [], thisWeek: [], lastWeek: [] };
    Object.keys(hist).forEach(function(id) {
      var e = hist[id], fs = e.firstSeen;
      if      (fs >= todayStart)     bkts.today.push(e);
      else if (fs >= yesterdayStart) bkts.yesterday.push(e);
      else if (fs >= thisWeekStart)  bkts.thisWeek.push(e);
      else if (fs >= lastWeekStart)  bkts.lastWeek.push(e);
    });
    ['today','yesterday','thisWeek','lastWeek'].forEach(function(k) {
      bkts[k].sort(function(a,b) { return b.firstSeen - a.firstSeen; });
    });
    return bkts;
  }

  /* ── read portfolio from localStorage ────────────── */
  function getState() {
    try { return JSON.parse(localStorage.getItem('primo_portfolio_v6') || '{}'); } catch(e) { return {}; }
  }
  function getSymbols() {
    var s = getState(), seen = {}, out = [];
    (s.transactions || []).forEach(function(t) {
      var sym = (t.ticker || t.symbol || '').toUpperCase();
      if (sym && !seen[sym]) { seen[sym] = 1; out.push(sym); }
    });
    return out;
  }
  function getSharesParam() {
    var s = getState(), net = {};
    (s.transactions || []).forEach(function(t) {
      var sym = (t.ticker || t.symbol || '').toUpperCase();
      if (!sym) return;
      var sh = parseFloat(t.shares) || 0;
      net[sym] = (net[sym] || 0) + (t.type === 'sell' ? -sh : sh);
    });
    return Object.keys(net).filter(function(k) { return net[k] > 0; })
      .map(function(k) { return k + ':' + net[k]; }).join(',');
  }

  /* ── build API URL ────────────────────────────────── */
  function buildUrl() {
    var syms = getSymbols();
    if (!syms.length) return null;
    var url = '/api/alerts?symbols=' + encodeURIComponent(syms.join(','));
    var sh  = getSharesParam();
    if (sh) url += '&shares=' + encodeURIComponent(sh);
    return url;
  }

  /* ── render one card ─────────────────────────────── */
  function makeCard(alert, firstSeen) {
    var color    = SEV_COLOR[alert.severity] || '#94a3b8';
    var dirColor = DIR_COLOR[alert.direction] || '#64748b';
    var isNew    = (Date.now() - firstSeen) < ONE_HOUR_MS;

    /* direction-sensitive icon for price_move */
    var icon = TYPE_ICON[alert.type] || '🔔';
    if (alert.type === 'price_move') icon = alert.direction === 'up' ? '📈' : '📉';

    var div = document.createElement('div');
    div.className = 'pp-alc dir-' + (alert.direction || 'neutral') + (isNew ? ' pp-alc-new' : '');

    /* click → dismiss flash immediately */
    div.addEventListener('click', function(e) {
      if (e.target.tagName === 'A') return;
      if (div.classList.contains('pp-alc-new')) {
        div.classList.remove('pp-alc-new');
        div.style.animation = 'none';
      }
    });

    var top = document.createElement('div');
    top.className = 'pp-alc-top';

    var left = document.createElement('div');
    left.className = 'pp-alc-left';
    var tvUrl = 'https://www.tradingview.com/chart/?symbol=' + encodeURIComponent(alert.symbol || '');
    left.innerHTML =
      '<span style="font-size:17px">' + icon + '</span>' +
      '<a class="pp-alc-sym" href="' + tvUrl + '" target="_blank" rel="noopener noreferrer">' +
        (alert.symbol || '') +
      '</a>' +
      '<span class="pp-alc-title" style="color:' + dirColor + '">' + (alert.title || '') + '</span>';

    var badge = document.createElement('span');
    badge.className = 'pp-alc-badge';
    badge.style.cssText = 'color:' + color + ';background:' + color + '22;border:1px solid ' + color + '44;';
    badge.textContent = SEV_HE[alert.severity] || '';

    top.appendChild(left);
    top.appendChild(badge);
    div.appendChild(top);

    var msg = document.createElement('div');
    msg.className = 'pp-alc-msg';
    msg.textContent = alert.message || '';
    div.appendChild(msg);

    return div;
  }

  /* ── render full list (bucketed by time) ─────────── */
  function renderList(alerts, generatedAt) {
    var list = document.getElementById(LIST_ID);
    if (!list) return;
    list.innerHTML = '';

    var hist  = mergeAlerts(alerts || []);
    var bkts  = bucketize(hist);
    var GROUPS = [
      { key: 'today',     label: 'היום'       },
      { key: 'yesterday', label: 'אתמול'       },
      { key: 'thisWeek',  label: 'השבוע'       },
      { key: 'lastWeek',  label: 'שבוע שעבר'   }
    ];
    var total = 0;
    GROUPS.forEach(function(g) { total += bkts[g.key].length; });

    if (!total) {
      list.innerHTML =
        '<div style="text-align:center;padding:60px 20px;">' +
        '<div style="font-size:40px;margin-bottom:14px">✅</div>' +
        '<div style="color:#34d399;font-size:17px;font-weight:700">הכל תקין בפורטפוליו</div>' +
        '<div style="color:hsl(210,10%,35%);font-size:14px;margin-top:8px">אין התראות פעילות כרגע</div>' +
        '</div>';
      updateBadge(0);
      return;
    }

    var first = true;
    GROUPS.forEach(function(g) {
      if (!bkts[g.key].length) return;
      var hdr = document.createElement('div');
      hdr.style.cssText = 'font-size:11px;font-weight:700;color:#475569;letter-spacing:.07em;' +
        'padding:10px 2px 5px;direction:rtl;' +
        (first ? '' : 'margin-top:4px;border-top:1px solid hsl(222,14%,17%);');
      hdr.textContent = g.label;
      list.appendChild(hdr);
      first = false;
      bkts[g.key].forEach(function(e) { list.appendChild(makeCard(e.alert, e.firstSeen)); });
    });

    updateBadge(total);

    /* footer timestamp */
    if (generatedAt) {
      try {
        var f = document.createElement('div');
        f.style.cssText = 'text-align:left;font-size:11px;color:#334155;margin-top:4px;padding:0 2px;';
        f.textContent = 'עודכן: ' + new Date(generatedAt).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
        list.appendChild(f);
      } catch(e) {}
    }
  }

  /* ── update badge count ──────────────────────────── */
  function updateBadge(n) {
    var btn = document.getElementById(NAVBTN_ID);
    if (!btn) return;
    var b = btn.querySelector('.pp-badge');
    if (n > 0) {
      if (!b) {
        b = document.createElement('span');
        b.className = 'pp-badge';
        btn.appendChild(b);
      }
      b.textContent = n > 99 ? '99+' : String(n);
    } else if (b) {
      b.remove();
    }
  }

  /* ── fetch alerts from backend ───────────────────── */
  function fetchAlerts(forceRefresh) {
    var url = buildUrl();
    if (!url) { renderList([], null); return; }

    var list = document.getElementById(LIST_ID);
    if (!_loaded || forceRefresh) {
      /* skeleton */
      if (list) {
        list.innerHTML = [1,2,3].map(function() {
          return '<div style="background:linear-gradient(90deg,hsl(222,18%,11%) 25%,hsl(222,18%,15%) 50%,hsl(222,18%,11%) 75%);' +
            'background-size:400px 100%;animation:pp-shimmer 1.4s infinite;border-radius:5px;height:68px;margin-bottom:9px;"></div>';
        }).join('');
      }
    }

    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var alerts = data.alerts || [];
        _loaded = true;
        renderList(alerts, data.generated_at);
        clearTimeout(_refreshTmr);
        _refreshTmr = setTimeout(function() { fetchAlerts(false); }, REFRESH_MS);
      })
      .catch(function() {
        if (list) list.innerHTML =
          '<div style="padding:24px;color:#f87171;text-align:center;font-size:14px;">⚠️ שגיאה בטעינת ההתראות</div>';
      });
  }

  /* ── show / hide panel ───────────────────────────── */
  function showPanel() {
    var overlay = document.getElementById(PANEL_ID);
    var navBtn  = document.getElementById(NAVBTN_ID);
    if (!overlay) return;
    overlay.classList.add('pp-alerts-active');
    if (navBtn) navBtn.classList.add('pp-alerts-navactive');
    if (!_loaded) fetchAlerts(true);
  }

  function hidePanel() {
    var overlay = document.getElementById(PANEL_ID);
    var navBtn  = document.getElementById(NAVBTN_ID);
    if (overlay) overlay.classList.remove('pp-alerts-active');
    if (navBtn)  navBtn.classList.remove('pp-alerts-navactive');
  }

  /* ── build the overlay panel HTML ───────────────── */
  function buildOverlay() {
    if (document.getElementById(PANEL_ID)) return;

    var overlay = document.createElement('div');
    overlay.id = PANEL_ID;

    /* sticky inner header */
    var stickyHdr = document.createElement('div');
    stickyHdr.style.cssText =
      'position:sticky;top:0;z-index:1;background:hsl(222,20%,6%);' +
      'border-bottom:1px solid hsl(222,14%,14%);padding:14px 20px 12px;' +
      'display:flex;align-items:center;justify-content:space-between;direction:rtl;';

    stickyHdr.innerHTML =
      '<div style="display:flex;align-items:center;gap:10px;">' +
        '<span style="font-size:22px">🔔</span>' +
        '<span style="font-weight:700;font-size:19px;color:#e2e8f0;">התראות</span>' +
        '<span id="pp-alerts-count" style="font-size:13px;color:hsl(210,10%,40%);"></span>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px;">' +
        '<button id="pp-alerts-refresh-btn" style="background:none;border:1px solid hsl(222,14%,26%);' +
          'color:#64748b;border-radius:4px;cursor:pointer;padding:4px 12px;font-size:13px;font-weight:600;' +
          'transition:all .15s;" onmouseover="this.style.borderColor=\'#f87171\';this.style.color=\'#f87171\';" ' +
          'onmouseout="this.style.borderColor=\'hsl(222,14%,26%)\';this.style.color=\'#64748b\';">↻ רענן</button>' +
        '<button id="pp-alerts-close-btn" style="background:none;border:1px solid hsl(222,14%,26%);' +
          'color:#64748b;border-radius:4px;cursor:pointer;padding:4px 10px;font-size:16px;font-weight:700;line-height:1;' +
          'transition:all .15s;" onmouseover="this.style.borderColor=\'#94a3b8\';this.style.color=\'#e2e8f0\';" ' +
          'onmouseout="this.style.borderColor=\'hsl(222,14%,26%)\';this.style.color=\'#64748b\';">✕</button>' +
      '</div>';

    overlay.appendChild(stickyHdr);

    /* scrollable list area */
    var listWrap = document.createElement('div');
    listWrap.id = LIST_ID;
    listWrap.style.cssText = 'padding:16px 20px 32px;max-width:820px;margin:0 auto;';
    overlay.appendChild(listWrap);

    document.body.appendChild(overlay);

    /* wire refresh + close buttons */
    document.getElementById('pp-alerts-refresh-btn').addEventListener('click', function() {
      _loaded = false;
      fetchAlerts(true);
    });
    document.getElementById('pp-alerts-close-btn').addEventListener('click', hidePanel);
  }

  /* ── inject nav tab button ───────────────────────── */
  function injectNavTab() {
    if (_injected || document.getElementById(NAVBTN_ID)) { _injected = true; return; }

    /* find the React tab bar — parent of the "דשבורד" button */
    var navBar  = null;
    var dashBtn = null;
    document.querySelectorAll('button').forEach(function(b) {
      if (b.textContent.trim() === 'דשבורד') dashBtn = b;
    });
    if (!dashBtn) return;
    navBar = dashBtn.parentElement;
    if (!navBar) return;

    /* clone style from an existing tab so it matches perfectly */
    var cloneClass = dashBtn.className;
    var cloneStyle = dashBtn.getAttribute('style') || '';

    var btn = document.createElement('button');
    btn.id        = NAVBTN_ID;
    btn.className = cloneClass;
    btn.setAttribute('style', cloneStyle);
    btn.textContent = '🔔 התראות';

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var isActive = btn.classList.contains('pp-alerts-navactive');
      if (isActive) {
        hidePanel();
      } else {
        /* deactivate React tabs visually */
        document.querySelectorAll('button').forEach(function(b) {
          if (b !== btn && b.className && b.className.indexOf('border-violet-500') !== -1) {
            /* simulate a click only to restore React state — no, just show our overlay on top */
          }
        });
        showPanel();
      }
    });

    navBar.appendChild(btn);
    _injected = true;

    /* hide our panel whenever a React nav tab is clicked */
    navBar.addEventListener('click', function(e) {
      if (e.target !== btn && e.target.tagName === 'BUTTON') {
        hidePanel();
      }
    });
  }

  /* ── update count label in overlay header ─────── */
  function syncCountLabel() {
    var countEl = document.getElementById('pp-alerts-count');
    var list    = document.getElementById(LIST_ID);
    if (!countEl || !list) return;
    var cards = list.querySelectorAll('.pp-alc').length;
    countEl.textContent = cards ? cards + ' התראות פעילות' : '';
  }

  /* ── boot ─────────────────────────────────────── */
  buildOverlay();

  var _deb19 = null;
  var obs19  = new MutationObserver(function() {
    clearTimeout(_deb19);
    _deb19 = setTimeout(function() {
      injectNavTab();
      syncCountLabel();
    }, 400);
  });
  obs19.observe(document.body, { childList: true, subtree: true });

  /* background fetch so badge is populated even before the user clicks */
  setTimeout(function() {
    injectNavTab();
    fetchAlerts(true);
  }, 4000);

})();
</script>
</body></html>
