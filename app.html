    growthData = growthData || {};

    /* ── Screener widget ───────────────────────────── */
    (function() {
      var sWrap = document.createElement('div');
      sWrap.style.cssText = 'margin-bottom:14px;border:1px solid hsl(222,14%,20%);border-radius:6px;overflow:hidden;';

      var sHdr = document.createElement('div');
      sHdr.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 12px;background:hsl(222,14%,13%);direction:rtl;';

      var sLabel = document.createElement('span');
      sLabel.style.cssText = 'font-weight:700;color:#94a3b8;font-size:14px;white-space:nowrap;';
      sLabel.textContent = '🔍 סקרין חד פעמי';

      var sInput = document.createElement('input');
      sInput.type = 'text';
      sInput.placeholder = 'NVDA, AAPL...';
      sInput.style.cssText = 'background:hsl(222,14%,8%);border:1px solid hsl(222,14%,28%);color:#e2e8f0;' +
        'padding:4px 10px;border-radius:4px;font-size:14px;width:120px;text-align:right;direction:ltr;outline:none;';
      sInput.value = _screenerSym;

      var sBtn = document.createElement('button');
      sBtn.textContent = 'בדוק';
      sBtn.style.cssText = 'padding:4px 12px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;' +
        'border:1px solid hsl(222,14%,28%);background:hsl(222,14%,20%);color:#e2e8f0;white-space:nowrap;';

      sHdr.appendChild(sLabel);
      sHdr.appendChild(sInput);
      sHdr.appendChild(sBtn);
      sWrap.appendChild(sHdr);

      var sResult = document.createElement('div');
      sResult.style.cssText = 'padding:10px 12px;background:hsl(222,14%,9%);direction:rtl;min-height:34px;';
      if (_screenerRes) {
        renderScreenerResult(sResult, _screenerSym, _screenerRes);
      } else {
        sResult.innerHTML = '<span style="color:#475569;font-size:13px;">הכנס טיקר ולחץ בדוק</span>';
      }
      sWrap.appendChild(sResult);
      panel.appendChild(sWrap);

      function doScreener() {
        var sym = sInput.value.trim().toUpperCase();
        if (!sym) return;
        _screenerSym = sym;
        _screenerRes = null;
        sResult.innerHTML = '<span style="color:#94a3b8;font-size:13px;">טוען נתונים עבור ' + sym + '...</span>';
        var enc = encodeURIComponent(sym);
        function jf(u) { return fetch(u).then(function(r){return r.json();}).catch(function(){return {};}); }
        Promise.all([
          jf('/api/ma200?symbols='        + enc),
          jf('/api/pe?symbols='           + enc),
          jf('/api/revenue?symbols='      + enc),
          jf('/api/gross_margin?symbols=' + enc),
          jf('/api/fundamentals?symbols=' + enc),
          jf('/api/insider?symbols='      + enc),
          jf('/api/growth_trend?symbols=' + enc)
        ]).then(function(res) {
          _screenerRes = { ma200: res[0], pe: res[1], rev: res[2], gm: res[3], fund: res[4], insider: res[5], growth: res[6] };
          renderScreenerResult(sResult, sym, _screenerRes);
        });
      }
      sBtn.addEventListener('click', doScreener);
      sInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doScreener(); });
    })();

    /* timestamp */
    var ts = document.createElement('p');
    ts.style.cssText = 'font-size:13.5px;color:#475569;margin-bottom:12px;direction:ltr;text-align:left;';
    ts.textContent = 'עדכון: ' + new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}) +
                     ' | הצלבה עם 6 פילטרי האלגוריתם';
    panel.appendChild(ts);

    /* per-stock pass counter */
    var scores = {};
    var FILTER_NAMES_TECH = ['📈 צמיחה','💰 תמחור','💎 איכות','🛡️ סיכון','🚀 מומנטום','📉 מגמה'];
    var FILTER_NAMES_FIN  = ['📈 ROE',  '💰 P/B',  '💎 דיבידנד','🛡️ ROA',   '🚀 מומנטום','📉 מגמה'];
    function filterNames(sym) { return isFin(sym) ? FILTER_NAMES_FIN : FILTER_NAMES_TECH; }

    function explainFilter(sym, i, f) {
      if (!f) return 'אין נתונים זמינים';
      var pass = f.pass, val = f.val, fin = isFin(sym);
      if (fin) {
        var fe = [
          pass ? val + ' — החברה מרוויחה טוב על ההון, סימן לניהול יעיל'  : val + ' — תשואה נמוכה על ההון',
          pass ? val + ' — מחיר הגיוני ביחס לשווי הנכסים בספרים'          : val + ' — יקר ביחס לשווי הנכסים',
          pass ? val + ' דיבידנד שנתי — הכנסה יציבה לבעל המניה'           : val + ' — דיבידנד נמוך מ-1.5%',
          pass ? val + ' — הבנק מרוויח טוב על כל שקל נכסים'               : val + ' — הבנק לא מנצל את נכסיו מספיק',
        ];
        if (i < 4) return fe[i];
      } else {
        var te = [
          pass ? 'ההכנסות גדלות ב' + val + ' — חברה שצומחת בקצב גבוה'   : 'הצמיחה ' + val + ' — איטית מדי לחברת טק',
          pass ? val + ' — מחיר הגיוני ביחס לצמיחה'                       : val + ' — יקר מדי ביחס לצמיחה',
          pass ? val + ' — החברה מרוויחה ביעילות גבוהה'                   : val + ' — שולי רווח נמוכים מהרצוי',
          pass ? val + ' — חוב נמוך, מאזן בריא'                           : val + ' — חוב גבוה, סיכון במיתון',
        ];
        if (i < 4) return te[i];
      }
      if (i === 4) return pass ? val + ' — מעל ממוצע 200 יומי, השוק בצידה' : val + ' — מתחת לממוצע 200 יומי';
      if (i === 5) return pass ? val + ' — הצמיחה האחרונה האיצה, עסק בתנופה' : val + ' — הצמיחה האחרונה האטה ⚠️';
      return val;
    }

    function overallVerdict(sym, passes, total) {
      if (!total) return 'אין נתונים זמינים עבור ' + sym;
      var name = isFin(sym) ? 'חברה פיננסית' : 'מניה';
      if (passes >= 5) return sym + ' עוברת ' + passes + ' מתוך ' + total + ' — ' + name + ' חזקה מאוד ✅';
      if (passes >= 4) return sym + ' עוברת ' + passes + ' מתוך ' + total + ' — ביצועים טובים 👍';
      if (passes >= 3) return sym + ' עוברת ' + passes + ' מתוך ' + total + ' — ממוצעת, לא בולטת ⚠️';
      if (passes >= 2) return sym + ' עוברת רק ' + passes + ' מתוך ' + total + ' — חלשה 🔴';
      return sym + ' נכשלת ברוב הפילטרים — זהירות ❌';
    }
    syms.forEach(function(s) { scores[s] = { passes: 0, total: 0, filters: [null,null,null,null,null,null] }; });

    /* ── build one filter section ──────────────────── */
    function makeFilter(num, heTitle, enThreshold, purpose, icon, stocks) {
      var wrap = document.createElement('div');
      wrap.style.cssText = 'margin-bottom:10px;border:1px solid hsl(222,14%,20%);border-radius:6px;overflow:hidden;';

      var hdr = document.createElement('div');
      hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:hsl(222,14%,13%);direction:rtl;';
      hdr.innerHTML =
        '<div style="display:flex;align-items:center;gap:6px;">' +
          '<span style="font-size:12px;font-weight:600;color:#475569;white-space:nowrap;">פילטר ' + num + '</span>' +
          '<span style="font-size:15px;font-weight:700;color:#e2e8f0;">' + icon + ' ' + heTitle + '</span>' +
        '</div>' +
        '<span style="font-size:12px;color:#475569;direction:ltr;font-family:monospace;">' + enThreshold + '</span>';
      wrap.appendChild(hdr);

      var desc = document.createElement('div');
      desc.style.cssText = 'padding:4px 12px;background:hsl(222,14%,10%);font-size:13px;color:#64748b;direction:rtl;border-top:1px solid hsl(222,14%,17%);';
      desc.textContent = '⟶ ' + purpose;
      wrap.appendChild(desc);

      var rows = document.createElement('div');
      rows.style.cssText = 'padding:8px 12px;display:flex;flex-wrap:wrap;gap:5px;direction:rtl;background:hsl(222,14%,9%);';
      if (!stocks.length) {
        rows.innerHTML = '<span style="color:#475569;font-size:14px;">אין נתונים זמינים</span>';
      } else {
        stocks.forEach(function(item) {
          var c = item.pass ? '#34d399' : '#f87171';
          var bg = item.pass ? '#052e16' : '#2d0a0a';
          var chip = document.createElement('span');
          chip.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:14px;font-weight:600;border:1px solid ' + c + '33;background:' + bg + ';';
          chip.innerHTML = '<span style="color:' + c + ';">' + (item.pass ? '✓' : '✗') + '</span>' +
            (item.fin ? FIN_BADGE : '') +
            ' <a href="https://www.tradingview.com/chart/?symbol=' + item.sym + '" target="_blank" rel="noopener noreferrer"' +
            ' style="color:' + c + ';text-decoration:none;font-weight:700;">' + item.sym + '</a>' +
            '<span style="color:' + (item.pass ? '#86efac' : '#fca5a5') + ';font-size:12px;"> ' + item.val + '</span>';
          rows.appendChild(chip);
          if (scores[item.sym]) {
            scores[item.sym].total++;
            if (item.pass) scores[item.sym].passes++;
            scores[item.sym].filters[num - 1] = { pass: item.pass, val: item.val };
          }
        });
      }
      wrap.appendChild(rows);
      return wrap;
    }

    /* ── Filter 1: Growth (tech) | ROE (financial) ── */
    var f1 = syms.map(function(s) {
      var fd = fundData[s];
      if (isFin(s)) {
        if (!fd || fd.roe == null) return null;
        return { sym: s, pass: fd.roe > 12, val: 'ROE ' + fd.roe + '%', fin: true };
      }
      var r = revData[s]; if (!r) return null;
      return { sym: s, pass: r.pct > 8, val: (r.pct >= 0 ? '+' : '') + r.pct + '%', fin: false };
    }).filter(Boolean).sort(function(a,b){ return (b.pass-a.pass) || (b.pass ? parseFloat(b.val)-parseFloat(a.val) : parseFloat(a.val)-parseFloat(b.val)); });
    panel.appendChild(makeFilter(1,'צמיחה | ROE','Revenue CAGR > 8% | ROE > 12%','מנוע הצמיחה (טק) | תשואה על ההון (פיננסי)','📈',f1));

    /* ── Filter 2: Valuation — PEG/FCF (tech) | P/B (financial) ── */
    var f2 = syms.map(function(s) {
      var fd = fundData[s];
      if (isFin(s)) {
        if (!fd || fd.priceToBook == null) return null;
        return { sym: s, pass: fd.priceToBook < 2, val: 'P/B ' + fd.priceToBook + 'x', fin: true };
      }
      var p = peData[s]; if (!p) return null;
      var ep = saneFwd(p) || p.trailingPE; if (!ep) return null;
      var r = revData[s];
      var peg = (r && r.pct > 3) ? +(ep / r.pct).toFixed(2) : null;
      var fcf = fd ? fd.fcfYield : null;
      var pass = peg ? peg < 2 : ep < 30;
      if (fcf && fcf > 3) pass = true;
      var val = peg ? 'PEG ' + peg : 'PE ' + fmtPE(ep);
      if (fcf != null) val += ' · FCF ' + fcf + '%';
      return { sym: s, pass: pass, val: val, fin: false };
    }).filter(Boolean).sort(function(a,b){ return b.pass-a.pass; });
    panel.appendChild(makeFilter(2,'תמחור','PEG < 2 | P/B < 2','תמחור ביחס לצמיחה (PEG) | תמחור ביחס להון עצמי (P/B)','💰',f2));

    /* ── Filter 3: Quality — GM/ROE (tech) | Dividend (financial) ── */
    var f3 = syms.map(function(s) {
      var fd = fundData[s];
      if (isFin(s)) {
        if (!fd || fd.dividendYield == null) return null;
        return { sym: s, pass: fd.dividendYield > 1.5, val: 'DIV ' + fd.dividendYield + '%', fin: true };
      }
      var g = gmData[s];
      if (!g && (!fd || fd.roe == null)) return null;
      var val = '', pass = false;
      if (g) { pass = g.pct > 40; val = 'GM ' + g.pct + '%'; }
      if (fd && fd.roe != null) {
        if (!g) { pass = fd.roe > 12; val = 'ROE ' + fd.roe + '%'; }
        else { val += ' · ROE ' + fd.roe + '%'; if (fd.roe > 12) pass = true; }
      }
      return { sym: s, pass: pass, val: val, fin: false };
    }).filter(Boolean).sort(function(a,b){ return b.pass-a.pass; });
    panel.appendChild(makeFilter(3,'איכות | דיבידנד','GM > 40% | ROE > 12% | Div > 1.5%','כסף אמיתי (טק: שולי רווח) | הכנסה יציבה (פיננסי: דיבידנד)','💎',f3));

    /* ── Filter 4: Risk — Debt/EBITDA (tech) | ROA (financial) ── */
    var f4 = syms.map(function(s) {
      var fd = fundData[s];
      if (isFin(s)) {
        if (!fd || fd.roa == null) return null;
        return { sym: s, pass: fd.roa > 1, val: 'ROA ' + fd.roa + '%', fin: true };
      }
      if (!fd || fd.debtEbitda == null) return null;
      return { sym: s, pass: fd.debtEbitda < 4, val: 'D/EBITDA ' + fd.debtEbitda + 'x', fin: false };
    }).filter(Boolean).sort(function(a,b){ return b.pass-a.pass; });
    panel.appendChild(makeFilter(4,'סיכון','Debt/EBITDA < 4 | ROA > 1%','מינוף (טק) | תשואת נכסים — יעילות בנקאית (פיננסי)','🛡️',f4));

    /* ── Filter 5: Momentum — MA200 (all categories) ── */
    var f5 = syms.map(function(s) {
      var m = ma200Data[s]; if (!m) return null;
      return { sym: s, pass: !m.below || m.pct > -8, val: (m.below ? '' : '+') + m.pct + '% vs MA200', fin: isFin(s) };
    }).filter(Boolean).sort(function(a,b){ return b.pass-a.pass; });
    panel.appendChild(makeFilter(5,'מומנטום','Not below MA200 by > 8%','כיוון השוק — האם המניה נסחרת מעל ממוצע 200 יומי?','🚀',f5));

    /* ── Insider callout (not scored — rare event) ── */
    var insiderBuyers = syms.filter(function(s) {
      var d = insiderData[s]; return d && d.hasBuys === true;
    });
    if (insiderBuyers.length) {
      var insBox = document.createElement('div');
      insBox.style.cssText = 'margin-bottom:10px;border:1px solid #34d39944;border-radius:6px;' +
        'padding:8px 12px;background:#052e1640;direction:rtl;display:flex;align-items:center;gap:8px;flex-wrap:wrap;';
      insBox.innerHTML = '<span style="font-size:14px;font-weight:700;color:#34d399;">👔 רכישת בעלי עניין:</span>';
      insiderBuyers.forEach(function(s) {
        var cnt = (insiderData[s].buyCount || 0);
        var chip = document.createElement('span');
        chip.style.cssText = 'font-size:13px;font-weight:700;color:#34d399;background:#34d39918;' +
          'border:1px solid #34d39944;border-radius:4px;padding:1px 8px;';
        chip.textContent = s + ' (' + cnt + ' קניות 6m)';
        insBox.appendChild(chip);
      });
      panel.appendChild(insBox);
    }

    /* ── Filter 6: Growth Trend (all categories) ─── */
    var f7 = syms.map(function(s) {
      var d = growthData[s]; if (!d) return null;
      var pass = !d.decelerating;
      var val = 'TTM ' + (d.ttmGrowth >= 0 ? '+' : '') + d.ttmGrowth + '% | CAGR ' + (d.cagr >= 0 ? '+' : '') + d.cagr + '%';
      return { sym: s, pass: pass, val: val, fin: isFin(s) };
    }).filter(Boolean).sort(function(a,b){ return b.pass-a.pass; });
    if (f7.length) panel.appendChild(makeFilter(6,'מגמת צמיחה','TTM Revenue ≥ 70% of 3yr CAGR','האצה/האטה — האם הצמיחה (4 רבעונים אחרונים vs שנה קודמת) האיצה או האטה?','📉',f7));

    /* ── Multiple Compression Risk ──────────────── */
    (function() {
      var PE_FLOOR = 15;
      var MIN_CAGR = 5;

      var mcRows = [];
      syms.forEach(function(s) {
        var p = peData[s];
        var g = growthData[s];
        if (!p || !g) return;
        var pe = p.trailingPE || p.forwardPE;
        if (!pe || pe <= 0) return;
        mcRows.push({
          s: s, pe: pe,
          cagr: (typeof g.cagr === 'number') ? g.cagr : null,
          ttm:  (typeof g.ttmGrowth === 'number') ? g.ttmGrowth : null
        });
      });

      if (!mcRows.length) return;

      mcRows.forEach(function(r) {
        if (r.cagr === null || r.ttm === null || r.cagr < 0 || r.ttm < 0) {
          r.status = 'na_neg'; return;
        }
        if (r.cagr < MIN_CAGR) {
          r.status = 'na_low'; return;
        }
        if (r.ttm >= r.cagr) {
          r.status = 'upside'; r.peg = r.pe / r.cagr; return;
        }
        r.peg = r.pe / r.cagr;
        var rawImplied = r.peg * r.ttm;
        r.impliedPE = Math.max(rawImplied, PE_FLOOR);
        r.impact = ((r.impliedPE / r.pe) - 1) * 100;
        r.status = r.impact <= -40 ? 'high' : r.impact <= -20 ? 'medium' : 'mild';
      });

      var order = { high: 0, medium: 1, mild: 2, upside: 3, na_low: 4, na_neg: 5 };
      mcRows.sort(function(a,b){
        var da = order[a.status], db = order[b.status];
        if (da !== db) return da - db;
        if (a.impact != null && b.impact != null) return a.impact - b.impact;
        return 0;
      });

      var COLOR = { high: '#f87171', medium: '#fb923c', mild: '#fbbf24', upside: '#34d399', na: '#64748b' };
      var MC_KEY = 'pp_mc_expanded';
      var expanded = false;
      try { expanded = localStorage.getItem(MC_KEY) === '1'; } catch(e) {}

      var wrap = document.createElement('div');
      wrap.style.cssText = 'margin-top:16px;border:1px solid hsl(222,14%,20%);border-radius:6px;overflow:hidden;';

      /* ── header with toggle button ── */
      var hdr = document.createElement('div');
      hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:hsl(222,14%,13%);direction:rtl;';
      hdr.innerHTML =
        '<div style="display:flex;align-items:center;gap:6px;">' +
          '<span style="font-size:15px;font-weight:700;color:#e2e8f0;">🗜️ סיכון כיווץ מכפילים</span>' +
        '</div>' +
        '<span style="font-size:12px;color:#475569;direction:ltr;font-family:monospace;">PEG × TTM = implied PE (floor 15)</span>';

      var toggleBtn = document.createElement('button');
      toggleBtn.style.cssText = 'margin-right:8px;padding:3px 10px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid hsl(222,14%,28%);background:none;color:#64748b;white-space:nowrap;';
      toggleBtn.textContent = expanded ? 'כווץ ▲' : 'הרחב ▼';
      hdr.insertBefore(toggleBtn, hdr.firstChild);
      wrap.appendChild(hdr);

      var desc = document.createElement('div');
      desc.style.cssText = 'padding:4px 12px;background:hsl(222,14%,10%);font-size:13px;color:#64748b;direction:rtl;border-top:1px solid hsl(222,14%,17%);';
      desc.textContent = '⟶ אם הצמיחה האטה, השוק מכווץ את המכפיל לפי אותו PEG — מה ההשפעה על מחיר המניה?';
      wrap.appendChild(desc);

      /* ── compact chip row (always visible) ── */
      var chipRow = document.createElement('div');
      chipRow.style.cssText = 'padding:8px 12px;display:flex;flex-wrap:wrap;gap:5px;direction:rtl;background:hsl(222,14%,10%);border-top:1px solid hsl(222,14%,17%);';
      mcRows.forEach(function(r) {
        var chip = document.createElement('span');
        var col, label;
        if      (r.status === 'na_neg') { col = '#f87171'; label = r.s + ' 🚨'; }
        else if (r.status === 'na_low') { col = '#fbbf24'; label = r.s + ' ⚠️'; }
        else if (r.status === 'upside') { col = '#34d399'; label = r.s + ' ↑';  }
        else { col = COLOR[r.status]; label = r.s + ' ' + r.impact.toFixed(0) + '%'; }
        chip.style.cssText = 'padding:2px 8px;border-radius:5px;font-size:13px;font-weight:700;color:' + col +
          ';background:' + col + '18;border:1px solid ' + col + '44;';
        chip.textContent = label;
        chipRow.appendChild(chip);
      });
      wrap.appendChild(chipRow);

      /* ── expanded detail rows (hidden by default) ── */
      var expandSection = document.createElement('div');
      expandSection.style.display = expanded ? 'block' : 'none';

      mcRows.forEach(function(r) {
        var row = document.createElement('div');
        row.style.cssText = 'display:grid;grid-template-columns:60px 1fr auto;align-items:center;gap:8px;padding:7px 12px;border-top:1px solid hsl(222,14%,15%);direction:rtl;';

        var symCol = document.createElement('span');
        symCol.style.cssText = 'font-weight:700;font-size:14px;color:#e2e8f0;';
        symCol.textContent = r.s;

        var mid  = document.createElement('div');
        mid.style.cssText = 'font-size:12.5px;color:#94a3b8;line-height:1.5;';

        var badge = document.createElement('div');
        badge.style.cssText = 'text-align:left;min-width:90px;';

        if (r.status === 'na_neg') {
          mid.innerHTML = 'PE <b style="color:#e2e8f0">' + r.pe.toFixed(1) + '</b> · ' +
                          'CAGR <b style="color:#f87171">' + (r.cagr==null?'—':(r.cagr>=0?'+':'')+r.cagr.toFixed(1)+'%') + '</b> · ' +
                          'TTM <b style="color:#f87171">' + (r.ttm==null?'—':(r.ttm>=0?'+':'')+r.ttm.toFixed(1)+'%') + '</b>';
          badge.innerHTML = '<div style="font-size:13px;font-weight:700;color:#f87171;">🚨 סכנה</div>' +
                            '<div style="font-size:10px;color:#f87171;opacity:.9;line-height:1.35;">התכווצות הכנסות</div>';
          row.style.background = 'hsl(0,40%,10%)';
        } else if (r.status === 'na_low') {
          mid.innerHTML = 'PE <b style="color:#e2e8f0">' + r.pe.toFixed(1) + '</b> · ' +
                          'CAGR <b style="color:#fbbf24">+' + r.cagr.toFixed(1) + '%</b> · ' +
                          'TTM <b style="color:#fbbf24">' + (r.ttm>=0?'+':'') + r.ttm.toFixed(1) + '%</b>';
          badge.innerHTML = '<div style="font-size:13px;font-weight:700;color:#fbbf24;">⚠️ אזהרה</div>' +
                            '<div style="font-size:10px;color:#fbbf24;opacity:.9;line-height:1.35;">קיפאון בצמיחה</div>';
          row.style.background = 'hsl(38,40%,8%)';
        } else if (r.status === 'upside') {
          mid.innerHTML = 'PE <b style="color:#e2e8f0">' + r.pe.toFixed(1) + '</b> · ' +
                          'CAGR <b style="color:#67e8f9">+' + r.cagr.toFixed(1) + '%</b> · ' +
                          'TTM <b style="color:' + COLOR.upside + '">+' + r.ttm.toFixed(1) + '%</b> · ' +
                          'PEG <b style="color:#a78bfa">' + r.peg.toFixed(2) + '</b>';
          badge.innerHTML = '<div style="font-size:12px;font-weight:700;color:' + COLOR.upside + ';">האצה ↑</div>' +
                            '<div style="font-size:10.5px;color:' + COLOR.upside + ';opacity:.8;">צפי להתרחבות מכפילים</div>';
        } else {
          var col = COLOR[r.status];
          mid.innerHTML =
            'PE <b style="color:#e2e8f0">' + r.pe.toFixed(1) + '</b> · ' +
            'CAGR <b style="color:#67e8f9">+' + r.cagr.toFixed(1) + '%</b> · ' +
            'TTM <b style="color:#fb923c">' + (r.ttm>=0?'+':'') + r.ttm.toFixed(1) + '%</b> · ' +
            'PEG <b style="color:#a78bfa">' + r.peg.toFixed(2) + '</b> · ' +
            'PE משוער <b style="color:' + col + '">' + r.impliedPE.toFixed(1) + '</b>';
          var label = r.status === 'high' ? '⚠ סיכון גבוה' :
                      r.status === 'medium' ? '⚠ אזהרה' : 'ℹ סיכון קל';
          badge.innerHTML =
            '<div style="font-size:13px;font-weight:700;color:' + col + ';">' + r.impact.toFixed(1) + '%</div>' +
            '<div style="font-size:10.5px;color:' + col + ';opacity:.8;">' + label + '</div>';
        }

        row.appendChild(symCol);
        row.appendChild(mid);
        row.appendChild(badge);
        expandSection.appendChild(row);
      });

      wrap.appendChild(expandSection);

      toggleBtn.addEventListener('click', function() {
        expanded = !expanded;
        expandSection.style.display = expanded ? 'block' : 'none';
        toggleBtn.textContent = expanded ? 'כווץ ▲' : 'הרחב ▼';
        try { localStorage.setItem(MC_KEY, expanded ? '1' : '0'); } catch(e) {}
      });

      panel.appendChild(wrap);
    })();

    /* ── Summary scoreboard ──────────────────────── */
    var ranked = syms.slice().sort(function(a,b){
      var sa = scores[a], sb = scores[b];
      var ha = sa && sa.total > 0, hb = sb && sb.total > 0;
      if (ha !== hb) return hb ? 1 : -1; /* no-data stocks last */
      if (!ha) return 0;
      return sb.passes - sa.passes;
    });

    if (ranked.length) {
      var sumHdr = document.createElement('div');
      sumHdr.style.cssText = 'font-weight:700;font-size:15px;color:#f59e0b;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid #f59e0b44;direction:rtl;';
      sumHdr.textContent = '🏆 ציון כולל — כמה פילטרים עברה כל מניה?';
      panel.appendChild(sumHdr);

      ranked.forEach(function(s) {
        var sc = scores[s];
        var noData = !sc || sc.total === 0;
        var c = noData ? '#475569' : sc.passes >= 4 ? '#34d399' : sc.passes >= 3 ? '#fbbf24' : sc.passes >= 2 ? '#fb923c' : '#f87171';
        var pct = (sc && sc.total > 0) ? Math.round(sc.passes / sc.total * 100) : 0;

        var rowWrap = document.createElement('div');
        rowWrap.style.cssText = 'border-bottom:1px solid hsl(222,14%,16%);';

        var row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;direction:rtl;';
        var catPill = isFin(s)
          ? '<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:#1e3a5f;color:#60a5fa;border:1px solid #3b82f640;">🏦 ערך</span>'
          : '<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:#1e2a1a;color:#34d399;border:1px solid #34d39930;">🚀 טק</span>';
        row.innerHTML =
          '<a href="https://www.tradingview.com/chart/?symbol=' + s + '" target="_blank" rel="noopener noreferrer"' +
          ' style="font-weight:700;font-size:15px;color:#e2e8f0;text-decoration:none;min-width:55px;" onclick="event.stopPropagation()">' + s + '</a>' +
          catPill +
          '<div style="flex:1;background:hsl(222,14%,18%);border-radius:3px;height:7px;overflow:hidden;">' +
          '<div style="width:' + pct + '%;height:100%;background:' + c + ';border-radius:3px;"></div></div>' +
          '<span style="font-size:14px;font-weight:700;color:' + c + ';min-width:36px;text-align:left;">' + (noData ? '—' : sc.passes + '/' + sc.total) + '</span>' +
          '<span style="font-size:11px;color:#475569;">▼</span>';

        /* category override dropdown — only for tickers not in hardcoded set */
        if (!isHardcodedCat(s)) {
          var sel = document.createElement('select');
          sel.title = 'שנה קטגוריה';
          sel.style.cssText = 'font-size:11px;padding:1px 4px;border-radius:4px;border:1px solid hsl(222,14%,28%);' +
            'background:hsl(222,14%,14%);color:#94a3b8;cursor:pointer;direction:rtl;';
          var optT = document.createElement('option');
          optT.value = 'tech'; optT.textContent = '🚀 טק';
          var optF = document.createElement('option');
          optF.value = 'fin'; optF.textContent = '🏦 ערך';
          sel.appendChild(optT); sel.appendChild(optF);
          try {
            var stored = localStorage.getItem('pp_cat_' + s);
            sel.value = stored === 'fin' ? 'fin' : 'tech';
          } catch(e) { sel.value = 'tech'; }
          sel.addEventListener('click', function(e) { e.stopPropagation(); });
          sel.addEventListener('change', function(e) {
            e.stopPropagation();
            try { localStorage.setItem('pp_cat_' + s, sel.value); } catch(e2) {}
            location.reload();
          });
          row.appendChild(sel);
        }

        rowWrap.appendChild(row);

        /* detail row — hidden by default */
        var detail = document.createElement('div');
        detail.style.cssText = 'display:none;padding:8px 12px;direction:rtl;background:hsl(222,14%,8%);border-top:1px solid hsl(222,14%,14%);';
        var filterSlots = (sc && sc.filters) ? sc.filters : [null,null,null,null,null,null];

        var verdict = document.createElement('div');
        verdict.style.cssText = 'font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid hsl(222,14%,16%);';
        verdict.textContent = overallVerdict(s, sc ? sc.passes : 0, sc ? sc.total : 0);
        detail.appendChild(verdict);

        filterSlots.forEach(function(f, i) {
          var fc = !f ? '#475569' : f.pass ? '#34d399' : '#f87171';
          var icon = !f ? '—' : f.pass ? '✓' : '✗';
          var line = document.createElement('div');
          line.style.cssText = 'display:flex;align-items:baseline;gap:8px;margin-bottom:5px;font-size:13px;';
          line.innerHTML =
            '<span style="color:' + fc + ';font-weight:700;min-width:18px;flex-shrink:0;">' + icon + '</span>' +
            '<span style="color:' + fc + ';font-weight:600;min-width:100px;flex-shrink:0;">' + filterNames(s)[i] + '</span>' +
            '<span style="color:#94a3b8;">' + explainFilter(s, i, f) + '</span>';
          detail.appendChild(line);
        });
        rowWrap.appendChild(detail);

        var open = false;
        row.addEventListener('click', function() {
          open = !open;
          detail.style.display = open ? 'block' : 'none';
          row.querySelector('span:last-child').textContent = open ? '▲' : '▼';
        });

        panel.appendChild(rowWrap);
      });
    }
  }

  /* ── tabbed container for all 4 insight panels ──── */
  function makeInsightTabs() {
    var TAB_DEFS = [
      { id: 'analysis', label: '🧠 ניתוח',     color: '#f59e0b' },
      { id: 'ma200',    label: '📉 MA200',      color: '#67e8f9' },
      { id: 'pe',       label: '💰 PE',         color: '#a78bfa' },
      { id: 'revenue',  label: '📊 Revenue',    color: '#34d399' },
    ];

    var wrap = document.createElement('div');
    wrap.id = 'pp-insight-tabwrap';
    wrap.style.cssText = 'background:hsl(222,14%,10%);border:1px solid hsl(222,14%,18%);border-radius:6px;margin-bottom:12px;direction:rtl;overflow:hidden;';

    var bar = document.createElement('div');
    bar.style.cssText = 'display:flex;border-bottom:1px solid hsl(222,14%,18%);';
    wrap.appendChild(bar);

    var btns = {}, panels = {};
    TAB_DEFS.forEach(function(t) {
      var btn = document.createElement('button');
      btn.textContent = t.label;
      btn.style.cssText = 'flex:1;padding:10px 4px;font-size:16.2px;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#64748b;transition:color .15s,border-color .15s;white-space:nowrap;';
      bar.appendChild(btn);
      btns[t.id] = { el: btn, color: t.color };

      var panel = document.createElement('div');
      panel.style.cssText = 'display:none;padding:14px 16px;';
      for (var j = 0; j < 3; j++) panel.appendChild(makeSkeleton());
      wrap.appendChild(panel);
      panels[t.id] = panel;

      btn.addEventListener('click', (function(id) { return function() { activate(id); }; })(t.id));
    });

    function activate(id) {
      TAB_DEFS.forEach(function(t) {
        var on = t.id === id;
        btns[t.id].el.style.color = on ? t.color : '#64748b';
        btns[t.id].el.style.borderBottomColor = on ? t.color : 'transparent';
        panels[t.id].style.display = on ? 'block' : 'none';
      });
      try { localStorage.setItem('pp_insight_tab', id); } catch(e) {}
    }

    var saved = '';
    try { saved = localStorage.getItem('pp_insight_tab') || 'analysis'; } catch(e) { saved = 'analysis'; }
    activate(saved);

    return { wrap: wrap, panels: panels };
  }

  function injectBoxes() {
    if (!isInsightsTab()) {
      if (_insightWrap && _insightWrap.parentNode) _insightWrap.parentNode.removeChild(_insightWrap);
      _insightWrap = null;
      _fetched = false;
      return;
    }
    if (_insightWrap && !document.body.contains(_insightWrap)) {
      _insightWrap = null;
      _fetched = false;
    }
    if (_insightWrap && document.body.contains(_insightWrap)) return;

    var syms = getSymbols();
    if (!syms.length) return;

<script>
/* =====================================================
   Feature Patch v11 — Up/Down card reorder buttons
   ===================================================== */
(function () {
  'use strict';

  var ORDER_KEY = 'pp_card_order';
  var _busy     = false;
  var _debounce = null;

  function tabKey() {
    var name = '';
    document.querySelectorAll('button').forEach(function(b) {
      if (b.className && b.className.indexOf('border-violet-500') !== -1) name = b.textContent.trim();
    });
    return name || 'default';
  }

  function fp(el) {
    if (el.id) return 'id:' + el.id;  // stable ID always wins
    // Use the first heading/bold element — its text is stable and doesn't change as data loads
    var h = el.querySelector('h1,h2,h3,h4,h5,th');
    if (!h) h = el.querySelector('[class*="font-bold"],[class*="font-semibold"],[class*="text-lg"],[class*="text-xl"]');
    if (h) {
      var t = h.textContent.replace(/\s+/g,' ').trim();
      if (t.length >= 2) return 'hd:' + t.slice(0, 40);
    }
    // Fallback: strip numbers/prices, use only stable Hebrew/Latin label text
    return 'tx:' + el.textContent.replace(/[\d.,₪$%+\-\u200B-\u200D]/g,'').replace(/\s+/g,' ').trim().slice(0, 40);
  }

  function saveOrder(main) {
    var order = {};
    try { order = JSON.parse(localStorage.getItem(ORDER_KEY) || '{}'); } catch(e) {}
    order[tabKey()] = Array.from(main.children).map(fp);
    try { localStorage.setItem(ORDER_KEY, JSON.stringify(order)); } catch(e) {}
  }

  function restoreOrder(main) {
    if (_busy) return;
    var order = {};
    try { order = JSON.parse(localStorage.getItem(ORDER_KEY) || '{}'); } catch(e) {}
    var saved = order[tabKey()];
    if (!saved || saved.length < 2) return;

    var children = Array.from(main.children);
    if (children.length < 2) return;
    var byFp = {};
    children.forEach(function(c) { byFp[fp(c)] = c; });

    var sorted = saved.map(function(f) { return byFp[f]; }).filter(Boolean);
    children.forEach(function(c) { if (sorted.indexOf(c) === -1) sorted.push(c); });

    var changed = sorted.some(function(c, i) { return main.children[i] !== c; });
    if (!changed) return;

    _busy = true;
    obs11.disconnect();
    sorted.forEach(function(c) { main.appendChild(c); });
    setTimeout(function() {
      obs11.observe(document.body, { childList: true, subtree: true });
      _busy = false;
    }, 80);
  }

  function moveCard(el, dir, main) {
    var before = el.getBoundingClientRect().top;

    if (dir === -1 && el.previousElementSibling) {
      var displaced = el.previousElementSibling.getBoundingClientRect().height;
      main.insertBefore(el, el.previousElementSibling);
      window.scrollBy(0, -displaced);
    } else if (dir === 1 && el.nextElementSibling) {
      var displaced = el.nextElementSibling.getBoundingClientRect().height;
      main.insertBefore(el.nextElementSibling, el);
      window.scrollBy(0, displaced);
    }
    saveOrder(main);
  }

  function ensureButtons(el, main) {
    if (el.querySelector('.pp-mover')) return;
    if (getComputedStyle(el).position === 'static') el.style.position = 'relative';
    el.dataset.ppH = '1';

    var mover = document.createElement('div');
    mover.className = 'pp-mover';

    var up = document.createElement('button');
    up.textContent = '▲';
    up.title = 'הזז למעלה';
    up.addEventListener('click', function(e) { e.stopPropagation(); moveCard(el, -1, main); });

    var dn = document.createElement('button');
    dn.textContent = '▼';
    dn.title = 'הזז למטה';
    dn.addEventListener('click', function(e) { e.stopPropagation(); moveCard(el, 1, main); });

    mover.appendChild(up);
    mover.appendChild(dn);
    el.appendChild(mover);
  }

  function processMain() {
    var main = document.querySelector('main');
    if (!main) return;
    Array.from(main.children).forEach(function(c) {
      if (c.nodeType === 1) ensureButtons(c, main);
    });
    restoreOrder(main);
  }

  var obs11 = new MutationObserver(function() {
    if (_busy) return;
    clearTimeout(_debounce);
    _debounce = setTimeout(processMain, 350);
  });

  obs11.observe(document.body, { childList: true, subtree: true });
  setTimeout(processMain, 3500);

})();
</script>

<script>
(function () {
  'use strict';

  /* ── viewport meta (ensure mobile scaling) ─────── */
  (function() {
    var vp = document.querySelector('meta[name="viewport"]');
    var val = 'width=device-width, initial-scale=1';
    if (vp) { vp.content = val; } else {
      var m = document.createElement('meta');
      m.name = 'viewport'; m.content = val;
      document.head.appendChild(m);
    }
  })();

  /* ── MA200 alert banner ─────────────────────────── */
  var DISMISS_KEY = 'pp_ma200_alert_dismissed';

  function getSyms() {
    try {
      var s = JSON.parse(localStorage.getItem('primo_portfolio_v6') || '{}');
      var seen = {}, out = [];
      (s.transactions || []).forEach(function(t) {
        var sym = (t.ticker || t.symbol || '').toUpperCase();
        if (sym && !seen[sym]) { seen[sym] = 1; out.push(sym); }
      });
      return out;
    } catch(e) { return []; }
  }

  function dismissKey(stocks) {
    return stocks.map(function(s) { return s.sym; }).sort().join(',');
  }

  function wasDismissed(stocks) {
    try {
      var d = JSON.parse(localStorage.getItem(DISMISS_KEY) || '{}');
      var ts = d[dismissKey(stocks)];
      return ts && (Date.now() - ts < 24 * 3600 * 1000);
    } catch(e) { return false; }
  }

  function showAlert(stocks) {
    if (!stocks.length || wasDismissed(stocks)) return;
    if (document.getElementById('pp-ma200-alert')) return;

    var banner = document.createElement('div');
    banner.id = 'pp-ma200-alert';
    banner.style.cssText = [
      'position:fixed', 'top:0', 'left:0', 'right:0', 'z-index:9999',
      'background:#450a0a', 'border-bottom:2px solid #ef4444',
      'padding:10px 16px', 'display:flex', 'align-items:flex-start',
      'justify-content:space-between', 'direction:rtl', 'gap:12px',
      'box-shadow:0 4px 12px #0006'
    ].join(';') + ';';

    var body = document.createElement('div');
    body.style.cssText = 'flex:1;min-width:0;';

    var title = document.createElement('div');
    title.style.cssText = 'font-weight:700;font-size:17.6px;color:#fca5a5;margin-bottom:6px;';
    title.textContent = '⚠️ ' + stocks.length + ' מניות מתחת לממוצע 200 יומי';
    body.appendChild(title);

    var chips = document.createElement('div');
    chips.className = 'pp-alert-chips';
    chips.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;';
    stocks.forEach(function(s) {
      var chip = document.createElement('span');
      chip.style.cssText = 'background:#7f1d1d;border-radius:4px;padding:2px 8px;font-size:16.2px;color:#fecaca;font-weight:600;white-space:nowrap;';
      chip.textContent = s.sym + ' (' + s.pct + '%)';
      chips.appendChild(chip);
    });
    body.appendChild(chips);
    banner.appendChild(body);

    var close = document.createElement('button');
    close.textContent = '✕';
    close.style.cssText = 'background:none;border:none;color:#fca5a5;font-size:27px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;';
    close.addEventListener('click', function() {
      banner.remove();
      var sp = document.getElementById('pp-ma200-spacer');
      if (sp) sp.remove();
      try {
        var d = JSON.parse(localStorage.getItem(DISMISS_KEY) || '{}');
        d[dismissKey(stocks)] = Date.now();
        localStorage.setItem(DISMISS_KEY, JSON.stringify(d));
      } catch(e) {}
    });
    banner.appendChild(close);
    document.body.insertBefore(banner, document.body.firstChild);

    /* spacer pushes page content below the fixed banner without touching React */
    requestAnimationFrame(function() {
      var spacer = document.getElementById('pp-ma200-spacer') || document.createElement('div');
      spacer.id = 'pp-ma200-spacer';
      spacer.style.cssText = 'height:' + banner.offsetHeight + 'px;flex-shrink:0;';
      var root = document.getElementById('root');
      if (root && !document.getElementById('pp-ma200-spacer')) {
        document.body.insertBefore(spacer, root);
      }
    });
  }

  function checkMA200() {
    var syms = getSyms();
    if (!syms.length) return;
    fetch('/api/ma200?symbols=' + encodeURIComponent(syms.join(',')))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var below = Object.keys(data)
          .filter(function(s) { return data[s].below; })
          .map(function(s) { return { sym: s, pct: data[s].pct }; })
          .sort(function(a, b) { return a.pct - b.pct; });
        showAlert(below);
      })
      .catch(function() {});
  }

  setTimeout(checkMA200, 4000);

})();
</script>

<script>
/* =====================================================
   Feature Patch v13 — Collapsible cards
   ===================================================== */
(function () {
  'use strict';

  var COLLAPSE_KEY = 'pp_collapsed_cards';

  /* ── stable card id ───────────────────────────────── */
  function cardId(el) {
    // Reuse the same stable-text logic as v11's fp()
    var h = el.querySelector('h1,h2,h3,h4,h5,th');
    if (!h) h = el.querySelector('[class*="font-bold"],[class*="font-semibold"],[class*="text-lg"],[class*="text-xl"]');
    if (h) {
      var t = h.textContent.replace(/\s+/g,' ').trim();
      if (t.length >= 2) return 'hd:' + t.slice(0, 40);
    }
    return 'tx:' + el.textContent.replace(/[\d.,₪$%+\-\u200B-\u200D]/g,'').replace(/\s+/g,' ').trim().slice(0, 40);
  }

  /* ── persist collapsed state ─────────────────────── */
  function getCollapsed() {
    try { return JSON.parse(localStorage.getItem(COLLAPSE_KEY) || '{}'); } catch(e) { return {}; }
  }

  function setCollapsed(id, val) {
    var state = getCollapsed();
    if (val) state[id] = 1; else delete state[id];
    try { localStorage.setItem(COLLAPSE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  /* ── toggle collapse on a card ───────────────────── */
  function toggleCollapse(el, btn) {
    var id = cardId(el);
    var now = el.hasAttribute('data-pp-collapsed');
    if (now) {
      el.removeAttribute('data-pp-collapsed');
      btn.textContent = '▾';
      btn.title = 'כווץ';
      setCollapsed(id, false);
    } else {
      el.setAttribute('data-pp-collapsed', '1');
      btn.textContent = '▸';
      btn.title = 'הרחב';
      setCollapsed(id, true);
    }
  }

  /* ── inject collapser button ─────────────────────── */
  function ensureCollapser(el) {
    if (el.querySelector('.pp-collapser')) return;
    // card must already be position:relative (ensured by v11)
    var id = cardId(el);
    var collapsed = getCollapsed();

    var btn = document.createElement('button');
    btn.className = 'pp-collapser';

    var isCollapsed = !!collapsed[id];
    if (isCollapsed) {
      el.setAttribute('data-pp-collapsed', '1');
      btn.textContent = '▸';
      btn.title = 'הרחב';
    } else {
      btn.textContent = '▾';
      btn.title = 'כווץ';
    }

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleCollapse(el, btn);
    });

    el.appendChild(btn);
  }

  /* ── click on collapsed card expands it ─────────── */
  function onCardClick(e) {
    var el = e.currentTarget;
    if (!el.hasAttribute('data-pp-collapsed')) return;
    // Don't expand if clicking the buttons themselves
    if (e.target.closest('.pp-collapser,.pp-mover')) return;
    var btn = el.querySelector('.pp-collapser');
    if (btn) toggleCollapse(el, btn);
  }

  /* ── process all main cards ──────────────────────── */
  var _busy13 = false;
  var _deb13  = null;

  function processMain13() {
    var main = document.querySelector('main');
    if (!main) return;
    Array.from(main.children).forEach(function(c) {
      if (c.nodeType !== 1) return;
      ensureCollapser(c);
      // register click-to-expand only once
      if (!c._ppCollapseClick) {
        c._ppCollapseClick = true;
        c.addEventListener('click', onCardClick);
      }
    });
  }

  var obs13 = new MutationObserver(function() {
    if (_busy13) return;
    clearTimeout(_deb13);
    _deb13 = setTimeout(processMain13, 400);
  });

  obs13.observe(document.body, { childList: true, subtree: true });
  setTimeout(processMain13, 4000);

})();
</script>

  function getSyms() {
    try {
      var s = JSON.parse(localStorage.getItem('primo_portfolio_v6') || '{}');
      var seen = {}, out = [];
      (s.transactions || []).forEach(function(t) {
        var sym = (t.ticker || t.symbol || '').toUpperCase();
        if (sym && !seen[sym]) { seen[sym] = 1; out.push(sym); }
      });
      return out;
    } catch(e) { return []; }
  }

  /* ── render the top bar ──────────────────────────── */
  function renderBar(data) {
    var existing = document.getElementById('pp-premarket-bar');
    if (existing) existing.remove();

    var syms = Object.keys(data);
    if (!syms.length) return;

    // Pick session from first available symbol
    var session = 'REGULAR';
    syms.forEach(function(s) { if (data[s].session) session = data[s].session; });

    var bar = document.createElement('div');
    bar.id = 'pp-premarket-bar';

    var lbl = document.createElement('span');
    lbl.className = 'pp-pm-label';
    lbl.textContent = SESSION_LABEL[session] || SESSION_LABEL.CLOSED;
    bar.appendChild(lbl);

    // Only show price chips when there's actual extended-hours data
    syms.forEach(function(sym) {
      var d = data[sym];
      if (!d.price || d.session === 'REGULAR') return;
      var pct = d.changePct;

      var chip = document.createElement('span');
      chip.className = 'pp-pm-chip';

      var icon = document.createElement('span');
      icon.className = 'pp-pm-icon';
      icon.textContent = '🌙';

      var symEl = document.createElement('span');
      symEl.className = 'pp-pm-sym';
      symEl.textContent = sym;

      var px = document.createElement('span');
      px.className = 'pp-pm-px';
      px.textContent = '$' + d.price.toFixed(2);

      chip.appendChild(icon);
      chip.appendChild(symEl);
      chip.appendChild(px);

      if (pct != null) {
        var pctEl = document.createElement('span');
        pctEl.className = pct >= 0 ? 'pp-pm-pos' : 'pp-pm-neg';
        pctEl.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
        chip.appendChild(pctEl);
      }
      bar.appendChild(chip);
    });

    /* inject bar after the sticky header */
    var header = document.querySelector('header') ||
                 document.querySelector('[class*="sticky"][class*="top"]');
    if (header && header.parentNode) {
      header.parentNode.insertBefore(bar, header.nextSibling);
    } else {
      var root = document.getElementById('root');
      if (root && root.firstChild) root.firstChild.insertBefore(bar, root.firstChild.firstChild);
    }

  }

  /* ── inject 🌙 badge into holdings table rows ────── */
  function injectTableBadges(data) {
    var syms = Object.keys(data).filter(function(s) {
      return data[s].price && data[s].session !== 'REGULAR';
    });
    if (!syms.length) return;

    /* find the "מחיר נוכחי" column index from the header row */
    var currentPriceIdx = -1;
    var headerRow = document.querySelector('table thead tr');
    if (headerRow) {
      Array.from(headerRow.querySelectorAll('th')).forEach(function(th, i) {
        var txt = th.textContent.trim();
        if (txt.indexOf('מחיר נוכחי') !== -1 || txt.indexOf('current') !== -1 || txt === 'מחיר') {
          currentPriceIdx = i;
        }
      });
    }

    document.querySelectorAll('table tbody tr').forEach(function(row) {
      var cells = Array.from(row.querySelectorAll('td'));
      if (!cells.length) return;

      // find which symbol this row belongs to
      var sym = null;
      cells.forEach(function(td) {
        var txt = td.textContent.trim().toUpperCase();
        if (syms.indexOf(txt) !== -1) sym = txt;
      });
      if (!sym || row.querySelector('.pp-pm-badge')) return;

      var d = data[sym];
      var pct = d.changePct;

      // use header-detected index; fallback: cell whose text matches the regular market price
      var priceCell = currentPriceIdx >= 0 ? cells[currentPriceIdx] : null;
      if (!priceCell && d.regularPrice) {
        var regStr = d.regularPrice.toFixed(2);
        cells.forEach(function(td) {
          if (td.textContent.indexOf(regStr) !== -1) priceCell = td;
        });
      }
      if (!priceCell) return; // don't guess

      var badge = document.createElement('span');
      badge.className = 'pp-pm-badge ' + (pct == null ? '' : pct >= 0 ? 'pos' : 'neg');
      badge.title = 'פרה/אחרי שעות מסחר';
      badge.textContent = '🌙 $' + d.price.toFixed(2) +
        (pct != null ? '  ' + (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%' : '');
      priceCell.appendChild(badge);
    });
  }

  /* ── main fetch ──────────────────────────────────── */
  function loadPremarket() {
    var syms = getSyms();
    if (!syms.length) return;
    fetch('/api/premarket?symbols=' + encodeURIComponent(syms.join(',')))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        _pmData = data;
        renderBar(data);
        if (isDashboardActive()) injectTableBadges(data);
      })
      .catch(function() {});
  }

  /* ── detect active tab ──────────────────────────── */
  function isDashboardActive() {
    var active = false;
    document.querySelectorAll('button').forEach(function(btn) {
      if (btn.textContent.trim() === 'דשבורד' &&
          btn.className.indexOf('border-violet-500') !== -1) active = true;
    });
    return active;
  }

  /* ── show/hide bar based on active tab ───────────── */
  function syncBarVisibility() {
    var bar = document.getElementById('pp-premarket-bar');
    if (!bar) return;
    /* if no tab buttons found yet (React still loading), keep bar visible */
    var tabButtons = document.querySelectorAll('button');
    var hasTabs = false;
    tabButtons.forEach(function(b){ if (b.textContent.trim() === 'דשבורד') hasTabs = true; });
    if (!hasTabs) return;
    bar.style.display = isDashboardActive() ? '' : 'none';
  }

  /* ── re-inject badges after React re-renders ─────── */
  var _deb14 = null;
  var obs14 = new MutationObserver(function() {
    clearTimeout(_deb14);
    _deb14 = setTimeout(function() {
      syncBarVisibility();
      if (_pmData && isDashboardActive()) injectTableBadges(_pmData);
    }, 400);
  });
  obs14.observe(document.body, { childList: true, subtree: true });

  setTimeout(loadPremarket, 3000);

})();
</script>

  function linkifyTable() {

<script>
/* =======================================================
   Primo Portfolio Feature Patch v16
   NYSE Market Countdown Timer
   ======================================================= */
(function () {
  'use strict';

  var EL_ID = 'pp-mkt-countdown';

  /* ── ET time components ─────────────────────────── */
  function getET() {
    var now = new Date();
    var parts = {};
    new Intl.DateTimeFormat('en-US', {
      timeZone: 'America/New_York',
      weekday: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }).formatToParts(now).forEach(function(p) { parts[p.type] = p.value; });
    var h = parseInt(parts.hour || '0');
    if (h === 24) h = 0; // midnight edge-case
    return {
      weekday: parts.weekday, // 'Mon','Tue',...
      h: h,
      m: parseInt(parts.minute || '0'),
      s: parseInt(parts.second || '0')
    };
  }

  /* ── compute market state + countdown ───────────── */
  function compute() {
    var et = getET();
    var tm = et.h * 60 + et.m;
    var isWeekday = ['Mon','Tue','Wed','Thu','Fri'].indexOf(et.weekday) !== -1;

    var state, color, heState, prefix, tH, tM, extraDays;
    extraDays = 0;

    if (!isWeekday) {
      state='CLOSED'; color='#f87171'; heState='סגור';    prefix='פתיחה בעוד'; tH=9; tM=30;
      extraDays = et.weekday === 'Sat' ? 2 : 1;
    } else if (tm < 240) {                  // before 4:00 AM
      state='CLOSED'; color='#f87171'; heState='סגור';    prefix='פתיחה בעוד'; tH=9; tM=30;
    } else if (tm < 570) {                  // 4:00–9:30 AM pre-market
      state='PRE';    color='#fbbf24'; heState='פרה-מרקט'; prefix='פתיחה בעוד'; tH=9; tM=30;
    } else if (tm < 960) {                  // 9:30 AM–4:00 PM regular
      state='OPEN';   color='#34d399'; heState='פתוח';    prefix='סגירה בעוד'; tH=16; tM=0;
    } else if (tm < 1200) {                 // 4:00–8:00 PM after-hours
      state='POST';   color='#fbbf24'; heState='אחרי שעות'; prefix='סיום בעוד'; tH=20; tM=0;
    } else {                                // after 8 PM
      state='CLOSED'; color='#f87171'; heState='סגור';    prefix='פתיחה בעוד'; tH=9; tM=30;
    }

    var secNow    = et.h * 3600 + et.m * 60 + et.s;
    var secTarget = tH  * 3600 + tM  * 60;
    var diff = secTarget - secNow + extraDays * 86400;
    if (diff < 0) diff += 86400;

    var hh = Math.floor(diff / 3600);
    var mm = Math.floor((diff % 3600) / 60);
    var ss = diff % 60;
    var countdown = pad(hh) + ':' + pad(mm) + ':' + pad(ss);

    return { state: state, color: color, heState: heState, prefix: prefix, countdown: countdown };
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  /* ── active tab check ───────────────────────────── */
  function isDashActive() {
    var ok = false;
    document.querySelectorAll('button').forEach(function(b) {
      if (b.textContent.trim() === 'דשבורד' && b.className.indexOf('border-violet-500') !== -1) ok = true;
    });
    return ok;
  }

  /* ── inject or update the bar ───────────────────── */
  function render() {
    var info = compute();
    var bar  = document.getElementById(EL_ID);

    if (!bar) {
      bar = document.createElement('div');
      bar.id = EL_ID;
      /* sits inside the header at the far-left edge (RTL = left = end-of-flex-row) */
      bar.style.cssText = 'display:flex;align-items:center;gap:8px;margin-left:0;margin-right:auto;padding:0 14px;direction:rtl;flex-shrink:0;';
      bar.innerHTML =
        '<span style="font-weight:700;font-size:13px;color:#94a3b8;">🇺🇸 NYSE</span>' +
        '<span id="pp-mkt-state" style="padding:1px 7px;border-radius:4px;font-size:12px;font-weight:700;">' + info.heState + '</span>' +
        '<span id="pp-mkt-prefix" style="font-size:12px;color:#64748b;">' + info.prefix + '</span>' +
        '<span id="pp-mkt-timer" style="font-family:monospace;font-size:15px;font-weight:700;color:#e2e8f0;letter-spacing:.06em;">' + info.countdown + '</span>';

      /* inject INSIDE the header, appended as last child so it floats to the left */
      var header = document.querySelector('header');
      if (header) {
        /* make sure header is flex so margin-right:auto works */
        if (!header.style.display) header.style.display = 'flex';
        header.style.alignItems = 'center';
        header.appendChild(bar);
      }
    }

    /* update values */
    var stEl = document.getElementById('pp-mkt-state');
    var prEl = document.getElementById('pp-mkt-prefix');
    var tmEl = document.getElementById('pp-mkt-timer');
    if (stEl) {
      stEl.textContent = info.heState;
      stEl.style.cssText = 'padding:1px 7px;border-radius:4px;font-size:12px;font-weight:700;' +
        'color:' + info.color + ';background:' + info.color + '22;border:1px solid ' + info.color + '44;';
    }
    if (prEl) prEl.textContent = info.prefix;
    if (tmEl) tmEl.textContent = info.countdown;

    /* show/hide based on active tab */
    var tabBtns = document.querySelectorAll('button');
    var hasDash = false;
    tabBtns.forEach(function(b) { if (b.textContent.trim() === 'דשבורד') hasDash = true; });
    if (hasDash) bar.style.display = isDashActive() ? 'flex' : 'none';
  }

  /* ── start ──────────────────────────────────────── */
  var _debV16 = null;
  var obsV16 = new MutationObserver(function() {
    clearTimeout(_debV16);
    _debV16 = setTimeout(render, 400);
  });
  obsV16.observe(document.body, { childList: true, subtree: true });

  setTimeout(function() {
    render();
    setInterval(render, 1000);
  }, 3500);

})();
</script>

<script>
/* =======================================================
   Primo Portfolio Feature Patch v17
   Polygon.io Live Price Feed — WebSocket push + yfinance fallback
   ======================================================= */
(function () {
  'use strict';

  var LIVE_BADGE_ID    = 'pp-live-badge';
  var FALLBACK_MS      = 15000;   // yfinance poll interval when WS inactive
  var RECONNECT_MS     = 3000;    // WS reconnect delay
  var _ws              = null;
  var _wsActive        = false;
  var _fallbackTimer   = null;

  /* ── collect portfolio symbols from localStorage ───── */
  function getSymbols() {
    try {
      var raw = localStorage.getItem('primo_portfolio_v6');
      if (!raw) return [];
      var state = JSON.parse(raw);
      var syms = {};
      (state.transactions || []).forEach(function(t) {
        if (t.symbol) syms[t.symbol.toUpperCase()] = 1;
      });
      return Object.keys(syms);
    } catch(e) { return []; }
  }

  /* ── merge prices into localStorage → fires React re-render ─ */
  function applyPrices(priceMap) {
    try {
      var raw = localStorage.getItem('primo_portfolio_v6');
      if (!raw) return;
      var state = JSON.parse(raw);
      var changed = false;
      Object.keys(priceMap).forEach(function(sym) {
        var entry = priceMap[sym];
        var p = (entry && entry.price != null) ? entry.price : entry;
        if (p && state.prices && state.prices[sym] !== p) {
          state.prices[sym] = p;
          changed = true;
        }
      });
      if (changed) {
        state.pricesLastUpdated = new Date().toISOString();
        localStorage.setItem('primo_portfolio_v6', JSON.stringify(state));
        window.dispatchEvent(new StorageEvent('storage', {
          key: 'primo_portfolio_v6',
          newValue: JSON.stringify(state),
          storageArea: localStorage
        }));
      }
    } catch(e) {}
  }

  /* ── prevClose stored in a SEPARATE key — never triggers React re-render ── */
  var PREV_CLOSE_KEY = 'primo_prevclose_v1';

  function savePrevClose(map) {
    if (!map || !Object.keys(map).length) return;
    try {
      var existing = JSON.parse(localStorage.getItem(PREV_CLOSE_KEY) || '{}');
      var changed = false;
      Object.keys(map).forEach(function(sym) {
        var v = map[sym];
        if (v && existing[sym] !== v) { existing[sym] = v; changed = true; }
      });
      if (changed) {
        localStorage.setItem(PREV_CLOSE_KEY, JSON.stringify(existing));
        /* notify pp18 to refresh day% column — does NOT trigger React */
        window.dispatchEvent(new StorageEvent('storage', {
          key: PREV_CLOSE_KEY, newValue: JSON.stringify(existing), storageArea: localStorage
        }));
      }
    } catch(e) {}
  }

  function loadPrevClose() {
    try { return JSON.parse(localStorage.getItem(PREV_CLOSE_KEY) || '{}'); }
    catch(e) { return {}; }
  }

  /* ── one-time boot fetch of prevClose via /api/prices ── */
  function fetchPrevClose() {
    var syms = getSymbols();
    if (!syms.length) return;
    fetch('/api/prices?symbols=' + encodeURIComponent(syms.join(',')))
      .then(function(r) { return r.json(); })
      .then(function(data) { savePrevClose(data.prevClose || {}); })
      .catch(function() {});
  }

  /* ── LIVE / delayed badge ───────────────────────────── */
  function upsertBadge(active) {
    var badge = document.getElementById(LIVE_BADGE_ID);
    if (!badge) {
      badge = document.createElement('span');
      badge.id = LIVE_BADGE_ID;
      badge.style.cssText =
        'font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;' +
        'cursor:default;margin-right:6px;transition:all .3s;';
      var rateSpan = document.querySelector('.pp-rate') ||
                     document.querySelector('header span');
      if (rateSpan && rateSpan.parentNode)
        rateSpan.parentNode.insertBefore(badge, rateSpan);
    }
    if (active) {
      badge.textContent = '● LIVE';
      badge.style.cssText += 'color:#34d399;background:#34d39922;border:1px solid #34d39944;';
      badge.title = 'Polygon.io live stream — prices update in real time';
    } else {
      badge.textContent = '○ delayed';
      badge.style.cssText += 'color:#94a3b8;background:transparent;border:1px solid #334155;';
      badge.title = 'yfinance snapshot (Polygon stream not active)';
    }
  }

  /* ── yfinance HTTP fallback poll ────────────────────── */
  function pollFallback() {
    if (_wsActive) return;  // WS came back — stop fallback loop
    var syms = getSymbols();
    if (!syms.length) {
      _fallbackTimer = setTimeout(pollFallback, FALLBACK_MS);
      return;
    }
    fetch('/api/live-prices?symbols=' + encodeURIComponent(syms.join(',')))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.active) {
          /* stream became active — WS will carry it from here */
          upsertBadge(true);
          return;
        }
        upsertBadge(false);
        applyPrices(data.prices || {});
        savePrevClose(data.prevClose || {});
        _fallbackTimer = setTimeout(pollFallback, FALLBACK_MS);
      })
      .catch(function() {
        _fallbackTimer = setTimeout(pollFallback, FALLBACK_MS);
      });
  }

  /* ── WebSocket client ───────────────────────────────── */
  function connectWS() {
    var syms = getSymbols();
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var url   = proto + '//' + location.host + '/ws/prices' +
                (syms.length ? '?symbols=' + encodeURIComponent(syms.join(',')) : '');

    try {
      _ws = new WebSocket(url);
    } catch(e) {
      scheduleReconnect();
      return;
    }

    _ws.onopen = function() {
      _wsActive = true;
      clearTimeout(_fallbackTimer);
      upsertBadge(false);  // show delayed until first tick proves stream active
      /* send symbol list (server subscribes them to Polygon) */
      if (syms.length)
        _ws.send(JSON.stringify({action: 'subscribe', symbols: syms}));
    };

    _ws.onmessage = function(evt) {
      try {
        var data = JSON.parse(evt.data);
        if (data.type === 'prices') {
          upsertBadge(!!data.active);
          applyPrices(data.prices || {});
        }
      } catch(e) {}
    };

    _ws.onclose = function() {
      _wsActive = false;
      upsertBadge(false);
      /* fall back to HTTP polling while WS is down */
      clearTimeout(_fallbackTimer);
      _fallbackTimer = setTimeout(pollFallback, 1000);
      scheduleReconnect();
    };

    _ws.onerror = function() {
      _wsActive = false;
      _ws && _ws.close();
    };
  }

  function scheduleReconnect() {
    setTimeout(function() {
      if (!_wsActive) connectWS();
    }, RECONNECT_MS);
  }

  /* ── boot ───────────────────────────────────────────── */
  setTimeout(function() {
    connectWS();
    /* also kick off fallback immediately so prices show fast */
    pollFallback();
    /* fetch prevClose once at startup so "יום %" column is always populated */
    fetchPrevClose();
  }, 4000);

})();
</script>

  function getState() {

  /* ── read prevClose from dedicated key (no React re-render) ─ */
  function loadPrevClose() {
