  <script>
/* =======================================================
   Primo Portfolio Feature Patch v5
   Sort | Day Toggle | Live USD/ILS
   ======================================================= */
(function () {
  'use strict';

  var sty = document.createElement('style');
  sty.textContent = [
    '.pp-th{cursor:pointer;user-select:none;}',
    '.pp-th:hover{color:hsl(195 100% 60%)!important;}',
    '.pp-asc .pp-ind::after{content:" \u2191";opacity:1;color:hsl(195 100% 50%);}',
    '.pp-desc .pp-ind::after{content:" \u2193";opacity:1;color:hsl(195 100% 50%);}',
    '.pp-ind::after{content:" \u2195";opacity:.35;font-size:24.3px;}',
    '.pp-day-btn{display:inline-block;font-size:24.3px;padding:1px 5px;margin-left:3px;border:1px solid hsl(222 14% 20%);background:transparent;color:hsl(210 10% 55%);cursor:pointer;border-radius:2px;transition:all .15s;vertical-align:middle;font-family:monospace;}',
    '.pp-day-btn.on,.pp-day-btn:hover{border-color:hsl(195 100% 50%/.6);color:hsl(195 100% 60%);}',
    '.pp-rate{font-size:27px;color:hsl(210 10% 40%);margin-left:8px;vertical-align:middle;}'
  ].join('');
  document.head.appendChild(sty);

  var _rate = 3.72;
  function refreshRate() {
    fetch('/api/usdils')
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(d){
        if (d && d.rate) {
          _rate = d.rate;
          document.querySelectorAll('.pp-rate').forEach(function(el){
            el.textContent = '\u20aa/$ '+_rate.toFixed(3);
          });
        }
      })
      .catch(function(){});
  }
  refreshRate();
  setInterval(refreshRate, 5*60*1000);

  function injectRateBadge() {
    document.querySelectorAll('button').forEach(function(btn) {
      if (btn._ppBadge) return;
      if (btn.textContent.includes('\u21bb') || /\u05e8\u05e2\u05e0\u05df/.test(btn.textContent)) {
        btn._ppBadge = true;
        var b = document.createElement('span');
        b.className = 'pp-rate';
        b.textContent = '\u20aa/$ '+_rate.toFixed(3);
        btn.parentNode && btn.parentNode.insertBefore(b, btn.nextSibling);
      }
    });
  }

  /* ── persistent sort state survives React re-renders ── */
  var _state = null;          // module-level: never reset
  var _headersBuilt = new WeakSet(); // tracks tables where headers were wired

  function parseNum(cell) {
    if (!cell) return null;
    var t = cell.textContent.replace(/[\u20aa$,%+\s]/g,'').replace(/\u2014/g,'').trim();
    if (!t) return null;
    var n = parseFloat(t);
    return isNaN(n) ? null : n;
  }

  function snapshotRows(tbody) {
    Array.from(tbody.rows).forEach(function(row) {
      if (row.cells.length === 1 && row.cells[0].colSpan > 4) return;
      if (row.cells.length < 7) return;
      var dc = row.cells[7];
      /* React renders cells[7] as the $ day gain (e.g. "+$688.39").
         Snapshot ONCE per row element. If _ppSnap exists on this same DOM row,
         keep the saved dayGain/dayHTML — otherwise we'd re-read our own
         modified innerHTML (e.g. "2.55%" parsed as 2.55 dollars). */
      if (!row._ppSnap) {
        row._ppSnap = {
          ticker:   row.cells[0] ? row.cells[0].textContent.trim() : '',
          shares:   parseNum(row.cells[2]),
          avgPrice: parseNum(row.cells[3]),
          curPrice: parseNum(row.cells[4]),
          value:    parseNum(row.cells[5]),
          gain:     parseNum(row.cells[6]),
          dayGain:  parseNum(dc),
          dayHTML:  dc ? dc.innerHTML : ''
        };
      } else {
        /* same DOM row — update non-day fields, preserve dayGain/dayHTML */
        row._ppSnap.ticker   = row.cells[0] ? row.cells[0].textContent.trim() : '';
        row._ppSnap.shares   = parseNum(row.cells[2]);
        row._ppSnap.avgPrice = parseNum(row.cells[3]);
        row._ppSnap.curPrice = parseNum(row.cells[4]);
        row._ppSnap.value    = parseNum(row.cells[5]);
        row._ppSnap.gain     = parseNum(row.cells[6]);
      }
    });
  }

  function collectGroups(tbody) {
    var groups = [];
    Array.from(tbody.rows).forEach(function(row) {
      if (row.cells.length === 1 && row.cells[0].colSpan > 4) {
        if (groups.length) groups[groups.length-1].desc = row;
      } else if (row.cells.length >= 7) {
        groups.push({ main: row, desc: null });
      }
    });
    return groups;
  }

  function buildHeaders(table, ths, state) {
    var COLS = [
      {i:0, k:'ticker',   label:'\u05e0\u05d9\u05d9\u05e8'},
      {i:1, k:null,        label:'\u05e1\u05d5\u05d2'},
      {i:2, k:'shares',    label:'\u05de\u05e0\u05d9\u05d5\u05ea'},
      {i:3, k:'avgPrice',  label:'\u05de\u05d7\u05d9\u05e8 \u05e2\u05dc\u05d5\u05ea'},
      {i:4, k:'curPrice',  label:'\u05de\u05d7\u05d9\u05e8 \u05e0\u05d5\u05db\u05d7\u05d9'},
      {i:5, k:'value',     label:'\u05e9\u05d5\u05d5\u05d9'},
      {i:6, k:'gain',      label:'\u05e8\u05d5\u05d5\u05d7/\u05d4\u05e4\u05e1\u05d3'},
      {i:7, k:'dayGain',   label:'\u05d9\u05d5\u05dd \u05d6\u05d4'},
    ];
    COLS.forEach(function(col) {
      var th = ths[col.i];
      if (!th) return;
      var isActive = (state.sortKey === col.k);
      var dir = isActive ? (state.sortDir > 0 ? 'pp-asc' : 'pp-desc') : '';
      th.className = 'py-2 px-2 text-[10px] text-muted-foreground uppercase tracking-wider font-medium whitespace-nowrap'
        + (col.k ? ' pp-th ' + dir : '');
      th.innerHTML = '';

      if (col.k === 'dayGain') {
        var btn = document.createElement('button');
        btn.className = 'pp-day-btn' + (state.dayMode === '%' ? ' on' : '');
        btn.textContent = state.dayMode;
        btn.onclick = function(e) {
          e.stopPropagation();
          state.dayMode = (state.dayMode === '$') ? '%' : '$';
          renderTable(table, ths, state);
        };
        th.appendChild(btn);
      }

      var sp = document.createElement('span');
      sp.textContent = col.label;
      th.appendChild(sp);

      if (col.k) {
        var ind = document.createElement('span');
        ind.className = 'pp-ind';
        th.appendChild(ind);
        /* use onclick (not addEventListener) so re-runs don't stack listeners */
        (function(k) {
          th.onclick = function() {
            if (state.sortKey === k) state.sortDir *= -1;
            else { state.sortKey = k; state.sortDir = -1; }
            renderTable(table, ths, state);
          };
        })(col.k);
      }
    });
  }

  function renderTable(table, ths, state) {
    buildHeaders(table, ths, state);
    var tbody = table.querySelector('tbody');
    if (!tbody) return;
    snapshotRows(tbody);
    var groups = collectGroups(tbody);
    if (!groups.length) return;

    var KEY = state.sortKey;
    var SNAP_KEY = KEY;
    groups.sort(function(a, b) {
      var sa = a.main._ppSnap, sb = b.main._ppSnap;
      if (!sa || !sb) return 0;
      if (KEY === 'ticker') return state.sortDir * sa.ticker.localeCompare(sb.ticker);
      var av = sa[SNAP_KEY], bv = sb[SNAP_KEY];
      if (av === null) av = state.sortDir > 0 ? Infinity : -Infinity;
      if (bv === null) bv = state.sortDir > 0 ? Infinity : -Infinity;
      return state.sortDir * (av - bv);
    });

    obs.disconnect();
    var frag = document.createDocumentFragment();
    groups.forEach(function(g) {
      frag.appendChild(g.main);
      if (g.desc) frag.appendChild(g.desc);
    });
    tbody.appendChild(frag);
    obs.observe(document.body, { childList: true, subtree: true });

    groups.forEach(function(g) {
      var dc = g.main.cells[7], snap = g.main._ppSnap;
      if (!dc || !snap) return;
      var html;
      if (state.dayMode === '%') {
        var dv = snap.dayGain, v = snap.value;
        if (dv != null && v != null) {
          var prev = v - dv;
          var pct = prev !== 0 ? dv / prev * 100 : 0;
          var pos = pct >= 0;
          html = '<span class="num" style="color:'+(pos?'#34d399':'#f87171')+';">'
            +(pos?'+':'')+pct.toFixed(2)+'%</span>';
        }
      } else {
        html = snap.dayHTML;
      }
      if (html && dc.innerHTML !== html) dc.innerHTML = html;
    });
  }

  function enhance(table) {
    var ths = Array.from(table.querySelectorAll('thead th'));
    var labels = ths.map(function(h){ return h.textContent.trim(); });
    if (!labels.includes('\u05e0\u05d9\u05d9\u05e8')) return;
    if (!labels.some(function(l){ return l.includes('\u05e9\u05d5\u05d5\u05d9'); })) return;

    /* initialise state once for the lifetime of the page */
    if (!_state) _state = { sortKey: 'value', sortDir: -1, dayMode: '%' };

    /* rebuild click handlers only when the <table> element itself is new */
    if (!_headersBuilt.has(table)) {
      _headersBuilt.add(table);
      buildHeaders(table, ths, _state);
    }

    /* always re-sort — fixes React re-renders resetting row order */
    var tbody = table.querySelector('tbody');
    if (!tbody) return;
    snapshotRows(tbody);
    var groups = collectGroups(tbody);
    if (!groups.length) return;
    var KEY = _state.sortKey;
    var SNAP_KEY = KEY;
    groups.sort(function(a, b) {
      var sa = a.main._ppSnap, sb = b.main._ppSnap;
      if (!sa || !sb) return 0;
      if (KEY === 'ticker') return _state.sortDir * sa.ticker.localeCompare(sb.ticker);
      var av = sa[SNAP_KEY], bv = sb[SNAP_KEY];
      if (av === null) av = _state.sortDir > 0 ? Infinity : -Infinity;
      if (bv === null) bv = _state.sortDir > 0 ? Infinity : -Infinity;
      return _state.sortDir * (av - bv);
    });
    /* skip re-append if rows already in correct order — prevents animation loop */
    var mainRows = Array.from(tbody.rows).filter(function(r){ return r.cells.length >= 7; });
    var alreadyOrdered = groups.every(function(g, i){ return mainRows[i] === g.main; });
    if (!alreadyOrdered) {
      /* disconnect observer during re-order so we don't fight React */
      obs.disconnect();
      var frag = document.createDocumentFragment();
      groups.forEach(function(g) {
        frag.appendChild(g.main);
        if (g.desc) frag.appendChild(g.desc);
      });
      tbody.appendChild(frag);
      obs.observe(document.body, { childList: true, subtree: true });
    }

    /* always refresh day column display */
    groups.forEach(function(g) {
      var dc = g.main.cells[7], snap = g.main._ppSnap;
      if (!dc || !snap) return;
      var html;
      if (_state.dayMode === '%') {
        var dv = snap.dayGain, v = snap.value;
        if (dv != null && v != null) {
          var prev = v - dv;
          var pct = prev !== 0 ? dv / prev * 100 : 0;
          var pos = pct >= 0;
          html = '<span class="num" style="color:'+(pos?'#34d399':'#f87171')+';">'
            +(pos?'+':'')+pct.toFixed(2)+'%</span>';
        }
      } else {
        html = snap.dayHTML;
      }
      if (html && dc.innerHTML !== html) dc.innerHTML = html;
    });
  }

  function markDetailRows() {
    document.querySelectorAll('table tbody tr').forEach(function(row) {
      if (row.cells.length === 1 && row.cells[0] && row.cells[0].colSpan > 4) {
        if (!row.classList.contains('pp-row-detail')) row.classList.add('pp-row-detail');
      }
    });
  }

  var _deb5 = null;
  var obs = new MutationObserver(function() {
    clearTimeout(_deb5);
    _deb5 = setTimeout(function() {
      document.querySelectorAll('table').forEach(enhance);
      injectRateBadge();
      markDetailRows();
    }, 300);
  });
  obs.observe(document.body, { childList: true, subtree: true });

  setTimeout(function() {
    document.querySelectorAll('table').forEach(enhance);
    injectRateBadge();
  }, 1200);

})();
</script>

<script>
/* =======================================================
   Primo Portfolio Feature Patch v6
   Excel & PDF Export from דוחות tab
   ======================================================= */
(function () {
  'use strict';

  var STORAGE_KEY = 'primo_portfolio_v6';

  /* ── helpers ─────────────────────────────────────── */
  function getState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); }
    catch(e) { return null; }
  }

  function calcHoldings(transactions, prices) {
    var holdings = {}, realized = {};
    var sorted = transactions.slice().sort(function(a,b){
      return new Date(a.date) - new Date(b.date);
    });
    sorted.forEach(function(n) {
      var sym = n.ticker.toUpperCase();
      if (!holdings[sym]) holdings[sym] = {ticker:sym, shares:0, totalCost:0, avgPrice:0};
      if (!realized[sym]) realized[sym] = 0;
      if (n.type === 'buy') {
        var cost = holdings[sym].totalCost + n.shares * n.price + (n.fee||0);
        var sh   = holdings[sym].shares + n.shares;
        holdings[sym].avgPrice  = cost / sh;
        holdings[sym].totalCost = cost;
        holdings[sym].shares    = sh;
      } else if (n.type === 'sell') {
        realized[sym] += (n.price - holdings[sym].avgPrice) * n.shares - (n.fee||0);
        holdings[sym].shares    = Math.max(0, holdings[sym].shares - n.shares);
        holdings[sym].totalCost = holdings[sym].shares * holdings[sym].avgPrice;
      } else if (n.type === 'dividend') {
        realized[sym] += n.price * n.shares - (n.fee||0);
      }
    });
    return Object.values(holdings).filter(function(h){ return h.shares > 0; }).map(function(h) {
      var cur   = (prices && prices[h.ticker]) || null;
      var value = cur ? cur * h.shares : null;
      var cost  = h.avgPrice * h.shares;
      var gain  = value !== null ? value - cost : null;
      var gainPct = cost > 0 && gain !== null ? gain / cost * 100 : null;
      return {
        ticker:    h.ticker,
        shares:    h.shares,
        avgPrice:  h.avgPrice,
        curPrice:  cur,
        cost:      cost,
        value:     value,
        gain:      gain,
        gainPct:   gainPct,
        realizedGain: realized[h.ticker] || 0
      };
    }).sort(function(a,b){ return (b.value||0) - (a.value||0); });
  }

  function fmt(n, decimals) {
    if (n === null || n === undefined) return '';
    return parseFloat(n.toFixed(decimals !== undefined ? decimals : 2));
  }

  /* ── Excel export ─────────────────────────────────── */
  function exportExcel() {
    var state = getState();
    if (!state) { alert('לא נמצאו נתונים בזיכרון הדפדפן'); return; }

    var wb = XLSX.utils.book_new();

    /* Sheet 1 — פורטפוליו */
    var holdings = calcHoldings(state.transactions || [], state.prices || {});
    var totalCost  = holdings.reduce(function(s,h){ return s + (h.cost||0); }, 0);
    var totalValue = holdings.reduce(function(s,h){ return s + (h.value||0); }, 0);
    var totalGain  = totalValue - totalCost;

    var portRows = [['ניירת','מניות','מחיר עלות ($)','מחיר נוכחי ($)','עלות ($)','שווי ($)','רווח/הפסד ($)','%']];
    holdings.forEach(function(h) {
      portRows.push([
        h.ticker,
        fmt(h.shares,4),
        fmt(h.avgPrice),
        h.curPrice !== null ? fmt(h.curPrice) : 'N/A',
        fmt(h.cost),
        h.value !== null ? fmt(h.value) : 'N/A',
        h.gain  !== null ? fmt(h.gain)  : 'N/A',
        h.gainPct !== null ? fmt(h.gainPct,2)+'%' : 'N/A'
      ]);
    });
    portRows.push([]);
    portRows.push(['סה״כ','','','', fmt(totalCost), fmt(totalValue), fmt(totalGain), totalCost > 0 ? fmt(totalGain/totalCost*100,2)+'%' : '']);
    var wsPort = XLSX.utils.aoa_to_sheet(portRows);
    wsPort['!cols'] = [{wch:8},{wch:10},{wch:14},{wch:14},{wch:14},{wch:14},{wch:16},{wch:8}];
    XLSX.utils.book_append_sheet(wb, wsPort, 'פורטפוליו');

    /* Sheet 2 — עסקאות */
    var typeMap = {buy:'קנייה', sell:'מכירה', dividend:'דיבידנד'};
    var txRows = [['תאריך','ניירת','סוג','מניות','מחיר ($)','עמלה ($)','סה״כ ($)','הערה']];
    (state.transactions || []).slice().sort(function(a,b){ return new Date(b.date)-new Date(a.date); }).forEach(function(t) {
      txRows.push([
        t.date,
        t.ticker,
        typeMap[t.type] || t.type,
        fmt(t.shares,4),
        fmt(t.price),
        fmt(t.fee||0),
        fmt(t.shares * t.price + (t.fee||0)),
        t.note || ''
      ]);
    });
    var wsTx = XLSX.utils.aoa_to_sheet(txRows);
    wsTx['!cols'] = [{wch:12},{wch:8},{wch:10},{wch:10},{wch:12},{wch:10},{wch:14},{wch:20}];
    XLSX.utils.book_append_sheet(wb, wsTx, 'עסקאות');

    /* Sheet 3 — הפקדות ₪ */
    var ilsRows = [['תאריך','סכום (₪)','שער $/₪','שווי ($)','מי','הערה']];
    (state.ilsDeposits || []).slice().sort(function(a,b){ return new Date(b.date)-new Date(a.date); }).forEach(function(d) {
      ilsRows.push([
        d.date,
        fmt(d.amount),
        fmt(d.rate,4),
        d.rate ? fmt(d.amount / d.rate) : 'N/A',
        d.who || '',
        d.note || ''
      ]);
    });
    var totalILS = (state.ilsDeposits||[]).reduce(function(s,d){ return s + (d.amount||0); },0);
    ilsRows.push([]);
    ilsRows.push(['סה״כ', fmt(totalILS),'','','','']);
    var wsILS = XLSX.utils.aoa_to_sheet(ilsRows);
    wsILS['!cols'] = [{wch:12},{wch:14},{wch:12},{wch:14},{wch:12},{wch:24}];
    XLSX.utils.book_append_sheet(wb, wsILS, 'הפקדות ₪');

    /* Sheet 4 — תובנות */
    var totalRealized = Object.keys(state.prices||{}).reduce(function(s, sym){
      return s;
    }, 0);
    // recalculate realized from transactions
    var realizedBySym = {};
    (state.transactions||[]).forEach(function(n){
      var sym = n.ticker.toUpperCase();
      if (!realizedBySym[sym]) realizedBySym[sym] = 0;
    });
    var insRows = [['מדד','ערך']];
    insRows.push(['שווי פורטפוליו ($)', fmt(totalValue)]);
    insRows.push(['עלות ממוצעת ($)', fmt(totalCost)]);
    insRows.push(['רווח לא ממומש ($)', fmt(totalGain)]);
    insRows.push(['% רווח לא ממומש', totalCost > 0 ? fmt(totalGain/totalCost*100,2)+'%' : 'N/A']);
    insRows.push(['מס׳ ניירות', holdings.length]);
    insRows.push(['מס׳ עסקאות', (state.transactions||[]).length]);
    insRows.push(['סה״כ הפקדות ₪', fmt((state.ilsDeposits||[]).reduce(function(s,d){ return s+(d.amount||0);},0))]);
    insRows.push(['יעד ₪', fmt(state.goalILS||0)]);
    insRows.push(['תאריך עדכון מחירים', state.pricesLastUpdated ? state.pricesLastUpdated.slice(0,10) : '']);
    var wsIns = XLSX.utils.aoa_to_sheet(insRows);
    wsIns['!cols'] = [{wch:28},{wch:18}];
    XLSX.utils.book_append_sheet(wb, wsIns, 'תובנות');

    /* Sheet 5 — תמונות מצב */
    if ((state.snapshots||[]).length > 0) {
      var snapRows = [['שם','תאריך','שווי ($)','עלות ($)','רווח ($)']];
      state.snapshots.forEach(function(s) {
        snapRows.push([
          s.name || '',
          s.date ? s.date.slice(0,10) : '',
          s.totalValue !== undefined ? fmt(s.totalValue) : '',
          s.totalCost  !== undefined ? fmt(s.totalCost)  : '',
          s.totalGain  !== undefined ? fmt(s.totalGain)  : ''
        ]);
      });
      var wsSnap = XLSX.utils.aoa_to_sheet(snapRows);
      wsSnap['!cols'] = [{wch:24},{wch:12},{wch:14},{wch:14},{wch:14}];
      XLSX.utils.book_append_sheet(wb, wsSnap, 'תמונות מצב');
    }

    var date = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, 'primo-portfolio-' + date + '.xlsx');
  }

  /* ── PDF export ───────────────────────────────────── */
  function exportPDF() {
    var btn = document.getElementById('pp-pdf-btn');
    if (btn) { btn.textContent = 'מייצא...'; btn.disabled = true; }

    // Capture the full app container
    var appEl = document.querySelector('#root > div') || document.querySelector('#root');
    if (!appEl) { alert('לא ניתן לאתר את תצוגת הדשבורד'); if(btn){btn.textContent='PDF + גרפים';btn.disabled=false;} return; }

    html2canvas(appEl, {
      scale: 1.5,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#0d1117',
      logging: false,
      windowWidth: appEl.scrollWidth,
      windowHeight: appEl.scrollHeight
    }).then(function(canvas) {
      var imgData = canvas.toDataURL('image/png');
      var pdf = new window.jspdf.jsPDF({
        orientation: canvas.width > canvas.height ? 'l' : 'p',
        unit: 'px',
        format: [canvas.width, canvas.height]
      });
      pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);

      // Second page: data summary from state
      var state = getState();
      if (state) {
        var holdings = calcHoldings(state.transactions || [], state.prices || {});
        var totalValue = holdings.reduce(function(s,h){ return s+(h.value||0);},0);
        var totalCost  = holdings.reduce(function(s,h){ return s+(h.cost||0); },0);
        var totalGain  = totalValue - totalCost;

        pdf.addPage([794, 1123], 'p');
        var y = 40;
        pdf.setFont('helvetica','bold');
        pdf.setFontSize(18);
        pdf.setTextColor(139,92,246);
        pdf.text('Primo Portfolio — Report', 40, y);
        y += 30;

        pdf.setFont('helvetica','normal');
        pdf.setFontSize(11);
        pdf.setTextColor(200,200,200);
        pdf.text('Date: ' + new Date().toLocaleDateString('he-IL'), 40, y); y+=24;

        pdf.setFontSize(13); pdf.setFont('helvetica','bold'); pdf.setTextColor(255,255,255);
        pdf.text('Portfolio Summary', 40, y); y+=18;

        pdf.setFont('helvetica','normal'); pdf.setFontSize(11); pdf.setTextColor(200,200,200);
        [
          ['Total Value',    '$' + totalValue.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})],
          ['Total Cost',     '$' + totalCost.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})],
          ['Unrealized P&L', (totalGain>=0?'+':'')+totalGain.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' (' + (totalCost>0?((totalGain/totalCost*100).toFixed(2)):'0.00') + '%)'],
          ['Positions',      holdings.length + ''],
          ['Transactions',   (state.transactions||[]).length + ''],
          ['ILS Deposits',   '₪' + ((state.ilsDeposits||[]).reduce(function(s,d){return s+(d.amount||0);},0)).toLocaleString('en')]
        ].forEach(function(row) {
          pdf.setTextColor(150,150,150); pdf.text(row[0]+':', 40, y);
          pdf.setTextColor(255,255,255); pdf.text(row[1], 200, y);
          y += 18;
        });

        y += 12;
        pdf.setFont('helvetica','bold'); pdf.setFontSize(13); pdf.setTextColor(255,255,255);
        pdf.text('Holdings', 40, y); y += 18;
        pdf.setFont('helvetica','normal'); pdf.setFontSize(9); pdf.setTextColor(130,130,130);
        pdf.text('Ticker', 40, y); pdf.text('Shares', 110, y); pdf.text('Avg $', 170, y);
        pdf.text('Cur $', 230, y); pdf.text('Value $', 290, y); pdf.text('P&L $', 370, y); pdf.text('%', 450, y);
        y += 4;
        pdf.setDrawColor(80,80,80); pdf.line(40, y, 754, y); y += 10;
        pdf.setFontSize(9); pdf.setTextColor(210,210,210);
        holdings.forEach(function(h) {
          if (y > 1080) return;
          var gain = h.gain !== null ? (h.gain>=0?'+':'')+h.gain.toFixed(2) : 'N/A';
          var pct  = h.gainPct !== null ? (h.gainPct>=0?'+':'')+h.gainPct.toFixed(2)+'%' : 'N/A';
          var color = h.gain !== null ? (h.gain >= 0 ? [52,211,153] : [248,113,113]) : [200,200,200];
          pdf.setTextColor(210,210,210);
          pdf.text(h.ticker, 40, y);
          pdf.text(h.shares.toFixed(2), 110, y);
          pdf.text('$'+h.avgPrice.toFixed(2), 170, y);
          pdf.text(h.curPrice ? '$'+h.curPrice.toFixed(2) : 'N/A', 230, y);
          pdf.text(h.value ? '$'+h.value.toFixed(0) : 'N/A', 290, y);
          pdf.setTextColor(color[0],color[1],color[2]);
          pdf.text(gain, 370, y);
          pdf.text(pct,  450, y);
          y += 15;
        });
      }

      var date = new Date().toISOString().slice(0,10);
      pdf.save('primo-portfolio-' + date + '.pdf');
      if (btn) { btn.textContent = 'PDF + גרפים'; btn.disabled = false; }
    }).catch(function(err) {
      console.error('PDF export error:', err);
      alert('שגיאה בייצוא PDF');
      if (btn) { btn.textContent = 'PDF + גרפים'; btn.disabled = false; }
    });
  }

  /* ── inject buttons into the reports tab only ────── */
  var _exportSection = null;

  function isReportsTabActive() {
    var active = false;
    document.querySelectorAll('button').forEach(function(btn) {
      if (btn.textContent.trim() === 'דוחות' &&
          btn.className.includes('border-violet-500')) active = true;
    });
    return active;
  }

  function removeExportSection() {
    if (_exportSection && _exportSection.parentNode) {
      _exportSection.parentNode.removeChild(_exportSection);
    }
    _exportSection = null;
  }

  function injectExportButtons() {
    // Only inject when דוחות tab is active
    if (!isReportsTabActive()) { removeExportSection(); return; }
    if (_exportSection && document.body.contains(_exportSection)) return;

    var allP = document.querySelectorAll('p');
    var snapshotP = null;
    allP.forEach(function(p) {
      if (p.textContent.includes('שמור תמונת מצב')) snapshotP = p;
    });
    if (!snapshotP) return;

    var container = snapshotP.closest('div[class]');
    if (!container || !container.parentNode) return;

    var section = document.createElement('div');
    section.id = 'pp-export-section';
    section.style.cssText = 'background:hsl(222 14% 11%);border:1px solid hsl(222 14% 18%);padding:16px;margin-bottom:0;';

    var label = document.createElement('p');
    label.style.cssText = 'font-size:13.5px;color:hsl(210 10% 45%);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;';
    label.textContent = 'ייצוא נתונים';
    section.appendChild(label);

    var row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:10px;flex-wrap:wrap;';

    var xlBtn = document.createElement('button');
    xlBtn.id = 'pp-xl-btn';
    xlBtn.textContent = '⬇ ייצוא לאקסל';
    xlBtn.style.cssText = 'background:hsl(142 70% 28%);color:#fff;border:none;padding:8px 18px;font-size:17.6px;cursor:pointer;border-radius:4px;font-weight:600;transition:opacity .15s;';
    xlBtn.onmouseover = function(){ this.style.opacity='.8'; };
    xlBtn.onmouseout  = function(){ this.style.opacity='1';  };
    xlBtn.onclick = function() {
      if (typeof XLSX === 'undefined') { alert('ספריית Excel עדיין נטענת, נסה שוב'); return; }
      exportExcel();
    };

    var desc = document.createElement('span');
    desc.style.cssText = 'font-size:13.5px;color:hsl(210 10% 40%);align-self:center;';
    desc.textContent = 'פורטפוליו · עסקאות · הפקדות · תובנות';

    row.appendChild(xlBtn);
    row.appendChild(desc);
    section.appendChild(row);

    container.parentNode.insertBefore(section, container);
    _exportSection = section;
  }

  var obs2 = new MutationObserver(function() {
    if (!isReportsTabActive()) { removeExportSection(); return; }
    injectExportButtons();
  });
  obs2.observe(document.body, { childList: true, subtree: true });

  setTimeout(injectExportButtons, 1500);

})();
</script>

<script>
/* =======================================================
   Primo Portfolio Feature Patch v7
   Modern UX/UI — Charts · Cards · Animations · Glow
   ======================================================= */
(function () {
  'use strict';

  /* ── CSS injection ──────────────────────────────────── */
  var css = `
    /* ── Scrollbar ─────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: hsl(222 14% 22%); border-radius: 99px; }

    /* ── Chart area fills — gradient glow ──────────── */
    .recharts-area-area {
      filter: drop-shadow(0 0 8px hsla(195,100%,50%,.25));
    }
    .recharts-area-curve {
      filter: drop-shadow(0 0 4px hsla(195,100%,55%,.5));
      stroke-width: 2.5 !important;
    }
    .recharts-line-curve {
      stroke-width: 2.5 !important;
      filter: drop-shadow(0 0 5px currentColor);
    }

    /* ── Bar chart — gradient + hover ──────────────── */
    .recharts-bar-rectangle path,
    .recharts-rectangle {
      transition: opacity .2s, filter .2s;
    }
    .recharts-bar-rectangle:hover path,
    .recharts-bar-rectangle:hover .recharts-rectangle {
      opacity: .85;
      filter: brightness(1.25) drop-shadow(0 0 6px hsla(195,100%,50%,.4));
    }

    /* ── Pie sectors ────────────────────────────────── */
    .recharts-pie-sector path {
      transition: transform .25s, filter .25s;
      transform-origin: center;
    }
    .recharts-pie-sector:hover path {
      transform: scale(1.04);
      filter: drop-shadow(0 0 10px hsla(195,100%,50%,.45));
    }

    /* ── Tooltip — glassmorphism ────────────────────── */
    .recharts-tooltip-wrapper .recharts-default-tooltip,
    .recharts-tooltip-wrapper > div {
      background: hsla(222,20%,8%,.92) !important;
      border: 1px solid hsla(195,100%,50%,.3) !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 32px hsla(0,0%,0%,.5), 0 0 0 1px hsla(195,100%,50%,.08) !important;
      backdrop-filter: blur(12px) !important;
      color: hsl(210 15% 91%) !important;
      font-size: 12px !important;
      padding: 10px 14px !important;
    }
    .recharts-tooltip-item { color: hsl(195 100% 65%) !important; }
    .recharts-tooltip-label { color: hsl(210 10% 55%) !important; font-size: 11px !important; margin-bottom: 4px !important; }

    /* ── Grid lines ─────────────────────────────────── */
    .recharts-cartesian-grid-horizontal line,
    .recharts-cartesian-grid-vertical line {
      stroke: hsla(222,14%,22%,.6) !important;
      stroke-dasharray: 3 4 !important;
    }

    /* ── Axis text ──────────────────────────────────── */
    .recharts-text.recharts-cartesian-axis-tick-value {
      fill: hsl(210 10% 42%) !important;
      font-size: 10px !important;
    }

    /* ── Legend ─────────────────────────────────────── */
    .recharts-legend-item-text {
      color: hsl(210 10% 55%) !important;
      font-size: 11px !important;
    }

    /* ── Chart entrance animation ───────────────────── */
    @keyframes pp-fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .recharts-wrapper {
      animation: pp-fadeUp .55s cubic-bezier(.22,.68,0,1.2) both;
    }

    /* ── Card hover lift ────────────────────────────── */
    .bg-card {
      transition: border-color .2s, box-shadow .2s !important;
    }
    .bg-card:hover {
      border-color: hsla(195,100%,50%,.2) !important;
      box-shadow: 0 4px 24px hsla(195,100%,40%,.08) !important;
    }

    /* ── Stat number glow ───────────────────────────── */
    .pp-stat-pos {
      color: #34d399 !important;
      text-shadow: 0 0 12px hsla(158,64%,52%,.45);
    }
    .pp-stat-neg {
      color: #f87171 !important;
      text-shadow: 0 0 12px hsla(0,91%,71%,.45);
    }
    .pp-stat-neu {
      color: hsl(195 100% 60%) !important;
      text-shadow: 0 0 14px hsla(195,100%,50%,.4);
    }

    /* ── Count-up animation ─────────────────────────── */
    @keyframes pp-numPop {
      0%   { opacity: 0; transform: scale(.88); }
      60%  { transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }
    .pp-num-anim { animation: pp-numPop .4s cubic-bezier(.22,.68,0,1.2) both; }

    /* ── Tab active indicator ───────────────────────── */
    button[class*="border-violet-500"] {
      position: relative;
    }
    button[class*="border-violet-500"]::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, hsl(262 83% 58%), transparent);
      border-radius: 2px;
      animation: pp-fadeUp .3s both;
    }

    /* ── Table row hover ────────────────────────────── */
    tbody tr {
      transition: background .15s;
    }
    tbody tr:hover {
      background: hsla(195,100%,50%,.04) !important;
    }

    /* ── Button press ───────────────────────────────── */
    button { transition: transform .1s, opacity .15s; }
    button:active { transform: scale(.97); }

    /* ── Positive/negative number auto-color ────────── */
    .pp-pos { color: #34d399 !important; text-shadow: 0 0 8px hsla(158,64%,52%,.3); }
    .pp-neg { color: #f87171 !important; text-shadow: 0 0 8px hsla(0,91%,71%,.3); }

    /* ── Gradient text for big totals ───────────────── */
    .pp-gradient-text {
      background: linear-gradient(135deg, hsl(195 100% 65%), hsl(262 83% 70%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px hsla(195,100%,50%,.25));
    }

    /* ── Shimmer loading skeleton ───────────────────── */
    @keyframes pp-shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .pp-skeleton {
      background: linear-gradient(90deg, hsl(222 18% 11%) 25%, hsl(222 18% 15%) 50%, hsl(222 18% 11%) 75%);
      background-size: 400px 100%;
      animation: pp-shimmer 1.4s infinite;
      border-radius: 4px;
    }

    /* ── Recharts SVG surface ───────────────────────── */
    .recharts-surface { overflow: visible !important; }

    /* ── Chart container border glow ────────────────── */
    .recharts-responsive-container {
      position: relative;
    }

    /* ── Portfolio value hero number ────────────────── */
    .pp-hero { font-variant-numeric: tabular-nums; }

    /* ── Pulse dot for live prices ───────────────────── */
    @keyframes pp-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(1.6); }
    }
    .pp-live-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: #34d399;
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
      animation: pp-pulse 2s infinite;
      box-shadow: 0 0 6px #34d399;
    }
  `;

  var styleEl = document.createElement('style');
  styleEl.textContent = css;
  document.head.appendChild(styleEl);

  /* ── SVG gradient defs injected into Recharts ──── */
  function injectSVGDefs() {
    document.querySelectorAll('.recharts-surface').forEach(function(svg) {
      if (svg._ppDefs) return;
      svg._ppDefs = true;
      var defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      defs.innerHTML = `
        <linearGradient id="ppGradCyan" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="hsl(195,100%,55%)" stop-opacity=".55"/>
          <stop offset="100%" stop-color="hsl(195,100%,45%)" stop-opacity=".02"/>
        </linearGradient>
        <linearGradient id="ppGradViolet" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="hsl(262,83%,68%)" stop-opacity=".5"/>
          <stop offset="100%" stop-color="hsl(262,83%,58%)" stop-opacity=".02"/>
        </linearGradient>
        <linearGradient id="ppGradGreen" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="hsl(158,64%,52%)" stop-opacity=".5"/>
          <stop offset="100%" stop-color="hsl(158,64%,42%)" stop-opacity=".02"/>
        </linearGradient>
        <linearGradient id="ppGradBar" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="hsl(195,100%,55%)" stop-opacity=".9"/>
          <stop offset="100%" stop-color="hsl(195,100%,35%)" stop-opacity=".6"/>
        </linearGradient>
        <linearGradient id="ppGradBarViolet" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="hsl(262,83%,68%)" stop-opacity=".9"/>
          <stop offset="100%" stop-color="hsl(262,83%,45%)" stop-opacity=".6"/>
        </linearGradient>
        <filter id="ppGlow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      `;
      svg.insertBefore(defs, svg.firstChild);
    });
  }

  /* ── Apply gradient fills to area charts ────────── */
  function enhanceAreaFills() {
    document.querySelectorAll('.recharts-area-area').forEach(function(path, i) {
      var grads = ['url(#ppGradCyan)', 'url(#ppGradViolet)', 'url(#ppGradGreen)'];
      if (!path._ppFill) {
        path._ppFill = true;
        path.setAttribute('fill', grads[i % grads.length]);
      }
    });
  }

  /* ── Apply gradient fills to bars ───────────────── */
  function enhanceBars() {
    document.querySelectorAll('.recharts-bar-rectangle .recharts-rectangle, .recharts-bar-rectangle path').forEach(function(el, i) {
      if (!el._ppFill) {
        el._ppFill = true;
        var fill = el.getAttribute('fill');
        if (fill && fill !== 'none') {
          var grads = ['url(#ppGradBar)', 'url(#ppGradBarViolet)', 'url(#ppGradGreen)'];
          el.setAttribute('fill', grads[i % grads.length]);
          el.setAttribute('rx', '2');
        }
      }
    });
  }

  /* ── Auto-color positive/negative spans ─────────── */
  function colorNumbers() {
    document.querySelectorAll('span.num, td span, span[class*="text-"]').forEach(function(el) {
      if (el._ppColored) return;
      var txt = el.textContent.trim();
      if (!txt) return;
      var isPos = /^\+/.test(txt) || (el.className && el.className.includes('green'));
      var isNeg = /^-/.test(txt) || (el.className && el.className.includes('red'));
      if (isPos) { el._ppColored = true; el.classList.add('pp-pos'); }
      else if (isNeg) { el._ppColored = true; el.classList.add('pp-neg'); }
    });
  }

  /* ── Add live dot next to refresh buttons ────────── */
  function injectLiveDot() {
    document.querySelectorAll('button').forEach(function(btn) {
      if (btn._ppLive) return;
      if (btn.textContent.includes('↻') || btn.textContent.includes('רענן')) {
        btn._ppLive = true;
        var dot = document.createElement('span');
        dot.className = 'pp-live-dot';
        btn.appendChild(dot);
      }
    });
  }

  /* ── Apply gradient text to big total values ─────── */
  function enhanceTotals() {
    document.querySelectorAll('p, span, div').forEach(function(el) {
      if (el._ppGrad || el.children.length > 0) return;
      var txt = el.textContent.trim();
      // Target large dollar amounts (the main portfolio total)
      if (/^\$[\d,]+(\.\d+)?$/.test(txt) && parseFloat(txt.replace(/[$,]/g,'')) > 10000) {
        if (el.className && (el.className.includes('text-2xl') || el.className.includes('text-3xl') || el.className.includes('text-4xl'))) {
          el._ppGrad = true;
          el.classList.add('pp-gradient-text');
        }
      }
    });
  }

  /* ── MutationObserver to run enhancements ────────── */
  var obs = new MutationObserver(function() {
    injectSVGDefs();
    enhanceAreaFills();
    enhanceBars();
    colorNumbers();
    injectLiveDot();
    enhanceTotals();
  });
  obs.observe(document.body, { childList: true, subtree: true, attributes: false });

  // initial run
  setTimeout(function() {
    injectSVGDefs();
    enhanceAreaFills();
    enhanceBars();
    colorNumbers();
    injectLiveDot();
    enhanceTotals();
  }, 800);

  setTimeout(function() {
    injectSVGDefs();
    enhanceAreaFills();
    enhanceBars();
    enhanceTotals();
  }, 2500);

})();
</script>

<script>
/* =======================================================
   Primo Portfolio Feature Patch v8
   רשימת הפקדות לפי תאריכים — Deposit History Report
   ======================================================= */
(function () {
  'use strict';

  var STORAGE_KEY = 'primo_portfolio_v6';
  var _depositSection = null;

  /* ── helpers ─────────────────────────────────────── */
  function isReportsTab() {
    var active = false;
    document.querySelectorAll('button').forEach(function(btn) {
      if (btn.textContent.trim() === 'דוחות' &&
          btn.className.includes('border-violet-500')) active = true;
    });
    return active;
  }

  function fmt(n, decimals) {
    decimals = decimals === undefined ? 0 : decimals;
    return n.toLocaleString('he-IL', {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals
    });
  }

  function fmtDate(d) {
    var parts = d.split('-');
    if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
    return d;
  }

  function getDeposits() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var state = JSON.parse(raw);
      return (state.ilsDeposits || []).slice().sort(function(a,b) {
        return a.date < b.date ? -1 : a.date > b.date ? 1 : 0;
      });
    } catch(e) { return []; }
  }

  function removeDepositSection() {
    if (_depositSection && _depositSection.parentNode) {
      _depositSection.parentNode.removeChild(_depositSection);
    }
    _depositSection = null;
  }

  function sourceColor(note) {
    if (!note) return '#7dd3fc';
    var n = note;
    if (n.includes('פסגות')) return '#a78bfa';
    if (n.includes('IBKR') || n.includes('Interactive') || n.includes('אינטראקטיב')) return '#67e8f9';
    return '#7dd3fc';
  }

  function whoColor(who) {
    if (!who) return '#94a3b8';
    if (who === 'אלעד') return '#67e8f9';
    if (who === 'סיוון') return '#f9a8d4';
    return '#94a3b8';
  }

  function buildTable(deposits) {
    var byYear = {};
    var yearOrder = [];
    deposits.forEach(function(d) {
      var y = d.date ? d.date.slice(0,4) : '?';
      if (!byYear[y]) { byYear[y] = []; yearOrder.push(y); }
      byYear[y].push(d);
    });

    var table = document.createElement('table');
    table.style.cssText = 'width:100%;border-collapse:collapse;font-size:16.2px;direction:rtl;';

    var thead = document.createElement('thead');
    thead.innerHTML = [
      '<tr style="border-bottom:1px solid hsl(222,14%,22%);">',
      '<th style="padding:8px 6px;color:hsl(210,10%,45%);font-weight:600;text-align:right;">תאריך</th>',
      '<th style="padding:8px 6px;color:hsl(210,10%,45%);font-weight:600;text-align:right;">מקור</th>',
      '<th style="padding:8px 6px;color:hsl(210,10%,45%);font-weight:600;text-align:left;">סכום ₪</th>',
      '<th style="padding:8px 6px;color:hsl(210,10%,45%);font-weight:600;text-align:left;">שער</th>',
      '<th style="padding:8px 6px;color:hsl(210,10%,45%);font-weight:600;text-align:left;">שווה $</th>',
      '<th style="padding:8px 6px;color:hsl(210,10%,45%);font-weight:600;text-align:center;">מי</th>',
      '</tr>'
    ].join('');
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    var grandTotal = 0;
    var grandUSD = 0;

    yearOrder.forEach(function(year) {
      var rows = byYear[year];
      var yearTotal = 0;
      var yearUSD = 0;

      var yrRow = document.createElement('tr');
      yrRow.innerHTML = '<td colspan="6" style="padding:10px 6px 4px;font-size:14.8px;font-weight:700;color:hsl(195,100%,65%);letter-spacing:.08em;border-top:1px solid hsl(222,14%,20%);">' + year + '</td>';
      tbody.appendChild(yrRow);

      rows.forEach(function(d) {
        var rate = d.rate || 0;
        var usd = rate > 0 ? d.amount / rate : 0;
        yearTotal += d.amount;
        yearUSD += usd;

        var sc = sourceColor(d.note);
        var wc = whoColor(d.who);

        var tr = document.createElement('tr');
        tr.style.cssText = 'transition:background .12s;';
        tr.onmouseover = function() { this.style.background = 'hsla(195,100%,50%,.04)'; };
        tr.onmouseout  = function() { this.style.background = ''; };

        var sourceLabel = (d.note || '—').replace('הפקדה ','').replace('— ','');

        tr.innerHTML = [
          '<td style="padding:6px;color:#e2e8f0;">' + fmtDate(d.date) + '</td>',
          '<td style="padding:6px;"><span style="color:' + sc + ';font-size:14.8px;">' + sourceLabel + '</span></td>',
          '<td style="padding:6px;text-align:left;font-family:monospace;color:#e2e8f0;">&#x20AA;' + fmt(d.amount) + '</td>',
          '<td style="padding:6px;text-align:left;color:#94a3b8;font-size:14.8px;">' + (rate ? fmt(rate, 3) : '&mdash;') + '</td>',
          '<td style="padding:6px;text-align:left;font-family:monospace;color:#94a3b8;">$' + fmt(usd, 0) + '</td>',
          '<td style="padding:6px;text-align:center;"><span style="font-size:14.8px;color:' + wc + ';">' + (d.who || '&mdash;') + '</span></td>'
        ].join('');
        tbody.appendChild(tr);
      });

      var subRow = document.createElement('tr');
      subRow.style.cssText = 'border-top:1px solid hsl(222,14%,18%);';
      subRow.innerHTML = [
        '<td style="padding:5px 6px;"></td>',
        '<td style="padding:5px 6px;font-size:14.8px;color:hsl(210,10%,45%);">&#x05E1;&#x05DB;&#x05D5;&#x05DD; ' + year + '</td>',
        '<td style="padding:5px 6px;text-align:left;font-family:monospace;font-weight:700;color:hsl(195,100%,65%);">&#x20AA;' + fmt(yearTotal) + '</td>',
        '<td style="padding:5px 6px;"></td>',
        '<td style="padding:5px 6px;text-align:left;font-family:monospace;color:hsl(195,100%,55%);">$' + fmt(yearUSD, 0) + '</td>',
        '<td style="padding:5px 6px;"></td>'
      ].join('');
      tbody.appendChild(subRow);

      grandTotal += yearTotal;
      grandUSD += yearUSD;
    });

    var gtRow = document.createElement('tr');
    gtRow.style.cssText = 'border-top:2px solid hsl(195,100%,35%);background:hsla(195,100%,50%,.06);';
    gtRow.innerHTML = [
      '<td style="padding:9px 6px;"></td>',
      '<td style="padding:9px 6px;font-weight:700;color:#e2e8f0;font-size:17.6px;">&#x05E1;&#x05D4;&#x05B4;&#x05DB; &#x05D4;&#x05E4;&#x05E7;&#x05D3;&#x05D5;&#x05EA;</td>',
      '<td style="padding:9px 6px;text-align:left;font-family:monospace;font-weight:800;font-size:18.9px;color:hsl(195,100%,65%);">&#x20AA;' + fmt(grandTotal) + '</td>',
      '<td style="padding:9px 6px;"></td>',
      '<td style="padding:9px 6px;text-align:left;font-family:monospace;font-weight:700;font-size:17.6px;color:hsl(195,100%,60%);">$' + fmt(grandUSD, 0) + '</td>',
      '<td style="padding:9px 6px;"></td>'
    ].join('');
    tbody.appendChild(gtRow);

    // per-person totals
    var personTotals = {};
    deposits.forEach(function(d) {
      var who = d.who || 'אחר';
      if (!personTotals[who]) personTotals[who] = {ils:0, usd:0, count:0};
      personTotals[who].ils += d.amount;
      personTotals[who].usd += d.rate ? d.amount/d.rate : 0;
      personTotals[who].count++;
    });

    table.appendChild(tbody);
    return { table: table, total: grandTotal, usd: grandUSD, count: deposits.length, byPerson: personTotals };
  }

  function injectDepositReport() {
    if (!isReportsTab()) { removeDepositSection(); return; }
    if (_depositSection && document.body.contains(_depositSection)) return;

    var anchor = document.getElementById('pp-export-section');
    if (!anchor) {
      document.querySelectorAll('p').forEach(function(p) {
        if (p.textContent.includes('שמור תמונת מצב')) {
          var c = p.closest('div[class]');
          if (c) anchor = c;
        }
      });
    }
    if (!anchor || !anchor.parentNode) return;

    var deposits = getDeposits();
    if (!deposits.length) return;

    var result = buildTable(deposits);

    var section = document.createElement('div');
    section.id = 'pp-deposit-report';
    section.style.cssText = 'background:hsl(222,14%,10%);border:1px solid hsl(222,14%,18%);border-radius:6px;padding:16px;margin-bottom:16px;direction:rtl;overflow-x:auto;';

    var header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;';

    var title = document.createElement('div');
    title.style.cssText = 'display:flex;align-items:center;gap:10px;';
    title.innerHTML = '<span style="font-size:20.2px;font-weight:700;color:#e2e8f0;">&#x1F4E5; &#x05E8;&#x05E9;&#x05D9;&#x05DE;&#x05EA; &#x05D4;&#x05E4;&#x05E7;&#x05D3;&#x05D5;&#x05EA;</span>' +
                      '<span style="font-size:14.8px;color:hsl(210,10%,45%);">' + result.count + ' &#x05D4;&#x05E4;&#x05E7;&#x05D3;&#x05D5;&#x05EA;</span>';

    var summary = document.createElement('div');
    summary.style.cssText = 'display:flex;gap:16px;flex-wrap:wrap;';
    summary.innerHTML = '<span style="font-size:16.2px;color:hsl(210,10%,50%);">&#x05E1;&#x05D4;&#x05B4;&#x05DB;: <strong style="color:hsl(195,100%,65%);">&#x20AA;' + fmt(result.total) + '</strong></span>' +
                        '<span style="font-size:16.2px;color:hsl(210,10%,50%);">&asymp; <strong style="color:hsl(195,100%,55%);">$' + fmt(result.usd, 0) + '</strong></span>';

    header.appendChild(title);
    header.appendChild(summary);
    section.appendChild(header);
    section.appendChild(result.table);

    // per-person totals footer
    var footer = document.createElement('div');
    footer.style.cssText = 'display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;border-top:1px solid hsl(222,14%,20%);padding-top:12px;direction:rtl;';

    var personColors = { 'אלעד': '#67e8f9', 'סיוון': '#f9a8d4' };
    Object.keys(result.byPerson).sort().forEach(function(who) {
      var p = result.byPerson[who];
      var col = personColors[who] || '#94a3b8';
      var card = document.createElement('div');
      card.style.cssText = 'background:hsl(222,14%,13%);border:1px solid hsl(222,14%,20%);border-radius:6px;padding:10px 16px;min-width:160px;';
      card.innerHTML = [
        '<div style="font-size:14.8px;color:' + col + ';font-weight:600;margin-bottom:4px;">סך הכל ' + who + '</div>',
        '<div style="font-family:monospace;font-size:20.2px;font-weight:700;color:#e2e8f0;">&#x20AA;' + fmt(p.ils) + '</div>',
        '<div style="font-family:monospace;font-size:16.2px;color:#64748b;margin-top:2px;">$' + fmt(p.usd, 0) + ' &middot; ' + p.count + ' הפקדות</div>'
      ].join('');
      footer.appendChild(card);
    });

    section.appendChild(footer);

    anchor.parentNode.insertBefore(section, anchor);
    _depositSection = section;
  }

  var obs8 = new MutationObserver(function() {
    if (!isReportsTab()) { removeDepositSection(); return; }
    injectDepositReport();
  });
  obs8.observe(document.body, { childList: true, subtree: true });

  setTimeout(injectDepositReport, 2000);

})();
</script>

<script>
/* =======================================================
   Primo Portfolio Feature Patch v9
   העלאת דוחות HTML/PDF — שמירה והצגה בלשונית דוחות
   ======================================================= */
(function () {
  'use strict';

  var REPORTS_KEY = 'pp_uploaded_reports';
  var _reportsSection = null;

  function isReportsTab() {
    var active = false;
    document.querySelectorAll('button').forEach(function(btn) {
      if (btn.textContent.trim() === 'דוחות' &&
          btn.className.includes('border-violet-500')) active = true;
    });
    return active;
  }

  function getReports() {
    try { return JSON.parse(localStorage.getItem(REPORTS_KEY) || '[]'); }
    catch(e) { return []; }
  }

  function saveReports(list) {
    try {
      localStorage.setItem(REPORTS_KEY, JSON.stringify(list));
    } catch(e) {
      if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED' || (e.code && e.code === 22)) {
        alert('⚠️ הדוח לא נשמר — נגמר שטח האחסון בדפדפן.\nמחק דוחות ישנים כדי לפנות מקום.');
      }
    }
  }

  function removeSection() {
    if (_reportsSection && _reportsSection.parentNode)
      _reportsSection.parentNode.removeChild(_reportsSection);
    _reportsSection = null;
  }

  /* ── modal viewer ────────────────────────────────── */
  function openViewer(report) {
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;flex-direction:column;';

    var bar = document.createElement('div');
    bar.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:hsl(222,14%,10%);border-bottom:1px solid hsl(222,14%,20%);flex-shrink:0;';
    bar.innerHTML = '<span style="color:#e2e8f0;font-size:17.6px;font-weight:600;direction:rtl;">' + report.name + '</span>';

    var closeBtn = document.createElement('button');
    closeBtn.textContent = '✕ סגור';
    closeBtn.style.cssText = 'background:none;border:1px solid hsl(222,14%,30%);color:#94a3b8;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:16.2px;';
    closeBtn.onclick = function() { document.body.removeChild(overlay); };
    bar.appendChild(closeBtn);
    overlay.appendChild(bar);

    var frame = document.createElement('iframe');
    frame.style.cssText = 'flex:1;border:none;width:100%;background:#fff;';

    if (report.type === 'html') {
      frame.srcdoc = report.content;
    } else {
      // PDF — use base64 data URL
      frame.src = report.content;
    }

    overlay.appendChild(frame);
    document.body.appendChild(overlay);
  }

  /* ── render uploaded reports list ───────────────── */
  function renderReportsList(container) {
    container.innerHTML = '';
    var reports = getReports();

    if (!reports.length) {
      container.innerHTML = '<p style="color:hsl(210,10%,40%);font-size:16.2px;text-align:center;padding:16px;direction:rtl;">אין דוחות שמורים עדיין</p>';
      return;
    }

    reports.forEach(function(r, i) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:4px;background:hsl(222,14%,12%);margin-bottom:6px;gap:8px;direction:rtl;';

      var icon = r.type === 'pdf' ? '📄' : '🌐';
      var dateStr = r.date ? r.date.slice(0,10) : '';

      var info = document.createElement('div');
      info.style.cssText = 'flex:1;min-width:0;';
      info.innerHTML = '<div style="font-size:16.2px;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + icon + ' ' + r.name + '</div>' +
                       '<div style="font-size:13.5px;color:hsl(210,10%,40%);margin-top:2px;">' + dateStr + ' · ' + r.type.toUpperCase() + '</div>';

      var btnGroup = document.createElement('div');
      btnGroup.style.cssText = 'display:flex;gap:6px;flex-shrink:0;';

      var viewBtn = document.createElement('button');
      viewBtn.textContent = 'הצג';
      viewBtn.style.cssText = 'background:hsl(195,100%,28%);color:#fff;border:none;padding:4px 10px;border-radius:3px;font-size:14.8px;cursor:pointer;';
      viewBtn.onclick = function() { openViewer(r); };

      var delBtn = document.createElement('button');
      delBtn.textContent = '✕';
      delBtn.style.cssText = 'background:hsl(0,60%,30%);color:#fff;border:none;padding:4px 8px;border-radius:3px;font-size:14.8px;cursor:pointer;';
      delBtn.onclick = function() {
        var list = getReports().filter(function(x){ return x.id !== r.id; });
        saveReports(list);
        renderReportsList(container);
      };

      btnGroup.appendChild(viewBtn);
      btnGroup.appendChild(delBtn);
      row.appendChild(info);
      row.appendChild(btnGroup);
      container.appendChild(row);
    });
  }

  /* ── inject upload section ───────────────────────── */
  function injectUploadSection() {
    if (!isReportsTab()) { removeSection(); return; }
    if (_reportsSection && document.body.contains(_reportsSection)) return;

    var anchor = document.getElementById('pp-export-section');
    if (!anchor) {
      document.querySelectorAll('p').forEach(function(p) {
        if (p.textContent.includes('שמור תמונת מצב')) {
          var c = p.closest('div[class]');
          if (c) anchor = c;
        }
      });
    }
    if (!anchor || !anchor.parentNode) return;

    var section = document.createElement('div');
    section.id = 'pp-upload-section';
    section.style.cssText = 'background:hsl(222,14%,10%);border:1px solid hsl(222,14%,18%);border-radius:6px;padding:16px;margin-bottom:16px;direction:rtl;';

    /* header */
    var hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;';

    var title = document.createElement('span');
    title.style.cssText = 'font-size:20.2px;font-weight:700;color:#e2e8f0;';
    title.textContent = '📂 דוחות שמורים';

    /* upload button */
    var uploadLabel = document.createElement('label');
    uploadLabel.style.cssText = 'background:hsl(222,14%,16%);border:1px dashed hsl(222,14%,28%);color:#94a3b8;padding:6px 14px;border-radius:4px;font-size:16.2px;cursor:pointer;transition:border-color .15s;';
    uploadLabel.textContent = '+ הוסף דוח (HTML / PDF)';
    uploadLabel.onmouseover = function(){ this.style.borderColor='hsl(195,100%,40%)'; this.style.color='#67e8f9'; };
    uploadLabel.onmouseout  = function(){ this.style.borderColor='hsl(222,14%,28%)'; this.style.color='#94a3b8'; };

    var fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.html,.htm,.pdf';
    fileInput.style.display = 'none';
    /* ── date detection helpers ──────────────────── */
    var HE_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני',
                     'יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
    var EN_MONTHS = ['january','february','march','april','may','june',
                     'july','august','september','october','november','december'];

    function detectReportName(filename, textContent) {
      var m, month = null, year = null;

      // 1. filename patterns: 14-01-26, 19.06.2025, 2025-03, 03_2026
      var fnLower = filename.toLowerCase().replace(/\.(html?|pdf)$/,'');
      var fnPatterns = [
        /(\d{2})[.\-_](\d{2})[.\-_](20\d{2})/,   // DD-MM-YYYY
        /(\d{2})[.\-_](\d{2})[.\-_](\d{2})(?!\d)/, // DD-MM-YY
        /(20\d{2})[.\-_](\d{2})/,                   // YYYY-MM
        /(\d{2})[.\-_](20\d{2})/                    // MM-YYYY
      ];
      m = fnLower.match(fnPatterns[0]);
      if (m) { month = parseInt(m[2],10)-1; year = parseInt(m[3],10); }
      if (!month) { m = fnLower.match(fnPatterns[1]); if(m){ month=parseInt(m[2],10)-1; year=2000+parseInt(m[3],10); } }
      if (!month) { m = fnLower.match(fnPatterns[2]); if(m){ year=parseInt(m[1],10); month=parseInt(m[2],10)-1; } }
      if (!month) { m = fnLower.match(fnPatterns[3]); if(m){ month=parseInt(m[1],10)-1; year=parseInt(m[2],10); } }

      // 2. text content: Hebrew month names
      if ((!month || !year) && textContent) {
        var txt = textContent.slice(0, 5000);
        HE_MONTHS.forEach(function(hm, idx) {
          if (month !== null) return;
          var re = new RegExp(hm + '[^\\d]{0,5}(20\\d{2})');
          var res = txt.match(re);
          if (res) { month = idx; year = parseInt(res[1],10); }
        });
        // English month names
        if (month === null) {
          EN_MONTHS.forEach(function(em, idx) {
            if (month !== null) return;
            var re = new RegExp(em + '[^\\d]{0,5}(20\\d{2})','i');
            var res = txt.match(re);
            if (res) { month = idx; year = parseInt(res[1],10); }
          });
        }
        // bare year pattern near "דוח" or "report"
        if (year === null) {
          var ry = txt.match(/(20\d{2})/);
          if (ry) year = parseInt(ry[1],10);
        }
      }

      if (month !== null && year) {
        return 'דוח ' + HE_MONTHS[month] + ' ' + year;
      }
      if (year) return 'דוח ' + year;
      return null;
    }

    fileInput.onchange = function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      var isPDF = file.name.toLowerCase().endsWith('.pdf');

      reader.onload = function(ev) {
        var textForDetection = isPDF ? '' : ev.target.result;
        var autoName = detectReportName(file.name, textForDetection) || file.name;
        var reports = getReports();
        reports.unshift({
          id: 'r_' + Date.now(),
          name: autoName,
          originalName: file.name,
          type: isPDF ? 'pdf' : 'html',
          content: ev.target.result,
          date: new Date().toISOString()
        });
        saveReports(reports);
        renderReportsList(listContainer);
      };

      if (isPDF) {
        reader.readAsDataURL(file);
      } else {
        reader.readAsText(file);
      }
      fileInput.value = '';
    };

    uploadLabel.appendChild(fileInput);

    hdr.appendChild(title);
    hdr.appendChild(uploadLabel);
    section.appendChild(hdr);

    /* list container */
    var listContainer = document.createElement('div');
    renderReportsList(listContainer);
    section.appendChild(listContainer);

    anchor.parentNode.insertBefore(section, anchor);
    _reportsSection = section;
  }

  var obs9 = new MutationObserver(function() {
    if (!isReportsTab()) { removeSection(); return; }
    injectUploadSection();
  });
  obs9.observe(document.body, { childList: true, subtree: true });

  setTimeout(injectUploadSection, 2200);

})();
</script>

<script>
/* =======================================================
   Primo Portfolio Feature Patch v10
   תובנות — מניות מתחת לMA200 + ניתוח PE
   ======================================================= */
(function () {
  'use strict';

  var _insightWrap = null;
  var _fetched = false;
  var _screenerSym = '';
  var _screenerRes = null;

  /* ── stock category classification ──────────────── */
  var VALUE_FIN_SET = {
    /* banks */       'JPM':1,'BAC':1,'WFC':1,'C':1,'GS':1,'MS':1,'USB':1,'PNC':1,'TFC':1,'FITB':1,'KEY':1,'RF':1,
    /* asset mgmt */  'BN':1,'BAM':1,'BX':1,'KKR':1,'APO':1,'CG':1,'BLK':1,'SCHW':1,'IBKR':1,'STT':1,'BK':1,
    /* insurance */   'MET':1,'PRU':1,'AIG':1,'CB':1,'ALL':1,'PGR':1,'AFL':1,'HIG':1,'TRV':1,
    /* payments */    'V':1,'MA':1,'AXP':1,'DFS':1,'COF':1,
    /* berkshire */   'BRK.B':1,'BRK.A':1,
    /* REITs */       'WELL':1,'O':1,'AMT':1,'SPG':1,'PLD':1,'EQIX':1,'DLR':1,'PSA':1,'EQR':1,'AVB':1,
                      'VTR':1,'PEAK':1,'DOC':1,'WPC':1,'NNN':1,'VICI':1,'IRM':1,'SBAC':1,'CCI':1,'MPW':1,
    /* energy */      'XOM':1,'CVX':1,'COP':1,'EOG':1,'SLB':1,'OXY':1,'VLO':1,'MPC':1,'PSX':1,'PXD':1,'DVN':1,
    /* utilities */   'NEE':1,'DUK':1,'SO':1,'D':1,'AEP':1,'EXC':1,'WEC':1,'XEL':1,'ETR':1,'FE':1,'AEE':1,'PCG':1,
    /* classic div */ 'PG':1,'JNJ':1,'KO':1,'PEP':1,'T':1,'VZ':1,'MO':1,'PM':1,'BTI':1,'MMM':1,'CAT':1,'DE':1,'HON':1,'GD':1,'LMT':1
  };
  /* user overrides stored in localStorage: pp_cat_SYM = 'fin' | 'tech' */
  function isFin(sym) {
    try {
      var ov = localStorage.getItem('pp_cat_' + sym);
      if (ov === 'fin')  return true;
      if (ov === 'tech') return false;
    } catch(e) {}
    return !!VALUE_FIN_SET[sym];
  }
  function isHardcodedCat(sym) { return !!VALUE_FIN_SET[sym]; }
  var FIN_BADGE = '<span style="font-size:10px;padding:0 4px;border-radius:3px;background:#1e3a5f;color:#60a5fa;border:1px solid #3b82f640;margin-right:3px;">🏦</span>';

  function isInsightsTab() {
    var active = false;
    document.querySelectorAll('button').forEach(function(b) {
      if (b.textContent.trim() === 'תובנות' &&
          b.className.includes('border-violet-500')) active = true;
    });
    return active;
  }

  function getSymbols() {
    try {
      var s = JSON.parse(localStorage.getItem('primo_portfolio_v6') || '{}');
      var net = {};
      (s.transactions || []).forEach(function(t) {
        var sym = (t.ticker || t.symbol || '').toUpperCase();
        if (!sym) return;
        var sh = parseFloat(t.shares) || 0;
        net[sym] = (net[sym] || 0) + (t.type === 'sell' ? -sh : sh);
      });
      return Object.keys(net).filter(function(k) { return net[k] > 0; });
    } catch(e) { return []; }
  }

  function fmt2(n) { return n != null ? n.toFixed(2) : '—'; }
  function fmtPE(n) { return n != null ? n.toFixed(1) : '—'; }

  /* forward PE sanity check — returns forwardPE only when plausible */
  function saneFwd(d) {
    if (!d || !d.forwardPE) return null;
    if (d.forwardPE < 3) return null;                               // unrealistically low
    if (d.trailingPE && d.trailingPE / d.forwardPE > 5) return null; // > 5× divergence from trailing
    return d.forwardPE;
  }

  /* ── skeleton ─────────────────────────────────────── */
  function makeSkeleton() {
    var d = document.createElement('div');
    d.style.cssText = 'background:linear-gradient(90deg,hsl(222,18%,11%) 25%,hsl(222,18%,15%) 50%,hsl(222,18%,11%) 75%);background-size:400px 100%;animation:pp-shimmer 1.4s infinite;border-radius:4px;height:14px;margin:6px 0;';
    return d;
  }

  /* ── card shell ──────────────────────────────────── */
  function makeCard(title, color) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'background:hsl(222,14%,10%);border:1px solid hsl(222,14%,18%);border-radius:6px;padding:14px 16px;margin-bottom:12px;direction:rtl;';

    var hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px;';
    hdr.innerHTML = '<span style="font-size:18.9px;font-weight:700;color:' + color + ';">' + title + '</span>';
    wrap.appendChild(hdr);

    var body = document.createElement('div');
    body.className = 'pp-card-body';
    body.appendChild(makeSkeleton());
    body.appendChild(makeSkeleton());
    body.appendChild(makeSkeleton());
    wrap.appendChild(body);
    return { wrap: wrap, body: body };
  }

  /* ── render MA200 results ───────────────────────── */
  function renderMA200(body, data) {
    body.innerHTML = '';
    var syms = Object.keys(data);
    var below = syms.filter(function(s) { return data[s].below; })
                    .sort(function(a,b) { return data[a].pct - data[b].pct; });
    var above = syms.filter(function(s) { return !data[s].below; })
                    .sort(function(a,b) { return data[b].pct - data[a].pct; });

    if (!below.length) {
      var ok = document.createElement('p');
      ok.style.cssText = 'color:#34d399;font-size:16.2px;margin:4px 0;';
      ok.textContent = '✓ כל המניות מעל ממוצע 200 יומי';
      body.appendChild(ok);
    } else {
      var lbl = document.createElement('p');
      lbl.style.cssText = 'font-size:13.5px;color:hsl(210,10%,40%);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;';
      lbl.textContent = 'מתחת לממוצע 200 יומי (' + below.length + ')';
      body.appendChild(lbl);

      below.forEach(function(sym) {
        var d = data[sym];
        var row = document.createElement('div');
        row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid hsl(222,14%,16%);';
        row.innerHTML = '<a href="https://www.tradingview.com/chart/?symbol=' + sym + '" target="_blank" rel="noopener noreferrer" style="font-weight:700;color:#f87171;font-size:16.2px;text-decoration:none;transition:color .15s;">' + sym + '</a>' +
          '<span style="font-size:14.8px;color:#94a3b8;">$' + fmt2(d.price) + ' <span style="color:#f87171;">' + d.pct + '%</span> vs MA200 $' + fmt2(d.ma200) + '</span>';
        body.appendChild(row);
      });
    }

    if (above.length) {
      var lbl2 = document.createElement('p');
      lbl2.style.cssText = 'font-size:13.5px;color:hsl(210,10%,40%);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.06em;';
      lbl2.textContent = 'מעל ממוצע 200 יומי (' + above.length + ')';
      body.appendChild(lbl2);
      above.forEach(function(sym) {
        var d = data[sym];
        var row = document.createElement('div');
        row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid hsl(222,14%,16%);';
        row.innerHTML = '<a href="https://www.tradingview.com/chart/?symbol=' + sym + '" target="_blank" rel="noopener noreferrer" style="font-weight:700;color:#34d399;font-size:16.2px;text-decoration:none;transition:color .15s;">' + sym + '</a>' +
          '<span style="font-size:14.8px;color:#94a3b8;">$' + fmt2(d.price) + ' <span style="color:#34d399;">+' + d.pct + '%</span> vs MA200 $' + fmt2(d.ma200) + '</span>';
        body.appendChild(row);
      });
    }
  }

  /* ── render PE results ──────────────────────────── */
  function renderPE(body, data) {
    body.innerHTML = '';
    var syms = Object.keys(data).filter(function(s) { return data[s].trailingPE; });

    if (!syms.length) {
      var none = document.createElement('p');
      none.style.cssText = 'color:#94a3b8;font-size:16.2px;';
      none.textContent = 'אין נתוני PE זמינים';
      body.appendChild(none);
      return;
    }

    // Use forward PE only when it passes sanity check; always fall back to trailing
    function effPE(d) { return saneFwd(d) || d.trailingPE; }
    syms.sort(function(a,b) { return (effPE(data[b])||0) - (effPE(data[a])||0); });
    var high = syms.filter(function(s) { var p=effPE(data[s]); return p > 50; });
    var low  = syms.filter(function(s) { var p=effPE(data[s]); return p > 0 && p < 15; });
    var mid  = syms.filter(function(s) { var p=effPE(data[s]); return p>=15&&p<=50; });

    function section(title, list, color) {
      if (!list.length) return;
      var lbl = document.createElement('p');
      lbl.style.cssText = 'font-size:13.5px;color:' + color + ';margin:8px 0 4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;';
      lbl.textContent = title + ' (' + list.length + ')';
      body.appendChild(lbl);
      list.forEach(function(sym) {
        var d = data[sym];
        var row = document.createElement('div');
        row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid hsl(222,14%,16%);';
        var fwd = saneFwd(d);
        var ttmOnly = !fwd;
        row.innerHTML = '<a href="https://www.tradingview.com/chart/?symbol=' + sym + '" target="_blank" rel="noopener noreferrer" style="font-weight:700;color:#e2e8f0;font-size:16.2px;text-decoration:none;transition:color .15s;">' + sym + '</a>' +
          '<span style="font-size:14.8px;">' +
          (fwd
            ? '<span style="color:' + color + ';font-weight:700;">fwd ' + fmtPE(fwd) + '</span>' +
              ' <span style="color:#64748b;">TTM ' + fmtPE(d.trailingPE) + '</span>'
            : '<span style="color:' + color + ';font-weight:700;">TTM ' + fmtPE(d.trailingPE) + '</span>' +
              ' <span style="color:#475569;font-size:13.5px;border:1px solid #334155;border-radius:3px;padding:1px 4px;">TTM only</span>'
          ) +
          '</span>';
        body.appendChild(row);
      });
    }

    section('🔴 יקרות מאוד  fwd PE > 50', high, '#f87171');
    section('🟡 הוגן  fwd PE 15–50', mid, '#fbbf24');
    section('🟢 זולות  fwd PE < 15', low, '#34d399');
  }

  function renderRevenue(body, data) {
    body.innerHTML = '';
    var syms = Object.keys(data);
    if (!syms.length) {
      body.innerHTML = '<p style="color:#94a3b8;font-size:16.2px;">אין נתוני Revenue זמינים</p>';
      return;
    }

    var rising  = syms.filter(function(s) { return data[s].rising; })
                      .sort(function(a,b) { return data[b].pct - data[a].pct; });
    var falling = syms.filter(function(s) { return !data[s].rising; })
                      .sort(function(a,b) { return data[a].pct - data[b].pct; });

    function section(title, list, color) {
      if (!list.length) return;
      var hdr = document.createElement('div');
      hdr.style.cssText = 'font-weight:700;font-size:16.2px;color:'+color+';margin:8px 0 4px;';
      hdr.textContent = title;
      body.appendChild(hdr);
      list.forEach(function(s) {
        var d = data[s];
        var row = document.createElement('div');
        row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.06);';
        var sign = d.pct > 0 ? '+' : '';
        row.innerHTML =
          '<span style="font-weight:600;font-size:17.6px;">' + s + '</span>' +
          '<span style="font-size:14.8px;color:#94a3b8;">$' + d.latest + 'B</span>' +
          '<span style="font-size:16.2px;font-weight:700;color:' + color + ';">' + sign + d.pct + '%</span>';
        body.appendChild(row);
      });
    }

    var compLabel = Object.keys(data).length ? (data[Object.keys(data)[0]].comp || 'YoY') : 'YoY';
    var lbl = document.createElement('p');
    lbl.style.cssText = 'font-size:13.5px;color:#475569;margin-bottom:8px;direction:ltr;text-align:left;';
    lbl.textContent = 'השוואה: ' + compLabel + (compLabel==='YoY' ? ' (שנה על שנה)' : ' (רבעון על רבעון)');
    body.insertBefore(lbl, body.firstChild);

    section('📈 הכנסות עולות', rising,  '#34d399');
    section('📉 הכנסות יורדות', falling, '#f87171');
  }

  /* ── revenue panel with annual / quarterly toggle ── */
  function setupRevenuePanel(panel, q, initialData) {
    panel.innerHTML = '';

    var bar = document.createElement('div');
    bar.style.cssText = 'display:flex;gap:6px;margin-bottom:10px;direction:rtl;';

    function makeBtn(label, active) {
      var b = document.createElement('button');
      b.textContent = label;
      b.style.cssText = 'padding:4px 12px;border-radius:4px;font-size:14.8px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid ' +
        (active ? '#34d399;background:#34d39922;color:#34d399;' : 'hsl(222,14%,26%);background:none;color:#64748b;');
      return b;
    }

    var btnA = makeBtn('שנתי YoY',   true);
    var btnQ = makeBtn('רבעוני YoY', false);
    bar.appendChild(btnA);
    bar.appendChild(btnQ);
    panel.appendChild(bar);

    var area = document.createElement('div');
    panel.appendChild(area);

    function setActive(isAnnual) {
      btnA.style.cssText = 'padding:4px 12px;border-radius:4px;font-size:14.8px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid ' +
        (isAnnual ? '#34d399;background:#34d39922;color:#34d399;' : 'hsl(222,14%,26%);background:none;color:#64748b;');
      btnQ.style.cssText = 'padding:4px 12px;border-radius:4px;font-size:14.8px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid ' +
        (!isAnnual ? '#34d399;background:#34d39922;color:#34d399;' : 'hsl(222,14%,26%);background:none;color:#64748b;');
    }

    function load(period, prefetch) {
      setActive(period === 'annual');
      if (prefetch) { renderRevenue(area, prefetch); return; }
      area.innerHTML = '';
      for (var j = 0; j < 3; j++) area.appendChild(makeSkeleton());
      fetch('/api/revenue?symbols=' + encodeURIComponent(q) + '&period=' + period)
        .then(function(r) { return r.json(); })
        .then(function(d) { renderRevenue(area, d); })
        .catch(function() { area.innerHTML = '<p style="color:#f87171;font-size:16.2px;">שגיאה</p>'; });
    }

    btnA.addEventListener('click', function() { load('annual'); });
    btnQ.addEventListener('click', function() { load('quarterly'); });

    load('annual', initialData);
  }

  /* ── cross-reference 5 algorithm filters ────────── */
  /* ── Screener: render one-ticker result ──────────── */
  function renderScreenerResult(container, sym, data) {
    container.innerHTML = '';
    var ma200D = data.ma200 || {}, peD = data.pe || {}, revD = data.rev || {};
    var gmD = data.gm || {}, fundD = data.fund || {}, insD = data.insider || {}, growD = data.growth || {};
    var p = peD[sym], r = revD[sym], g = gmD[sym], fd = fundD[sym];
    var m = ma200D[sym], ins = insD[sym], gt = growD[sym];
    var fin = isFin(sym);
    var SNAMES = fin
      ? ['📈 ROE','💰 P/B','💎 דיבידנד','🛡️ ROA','🚀 מומנטום','📉 מגמה']
      : ['📈 צמיחה','💰 תמחור','💎 איכות','🛡️ סיכון','🚀 מומנטום','📉 מגמה'];
    var slots = [null, null, null, null, null, null];

    if (fin) {
      /* F1: ROE */
      if (fd && fd.roe != null) slots[0] = { pass: fd.roe > 12, val: 'ROE ' + fd.roe + '%' };
      /* F2: P/B */
      if (fd && fd.priceToBook != null) slots[1] = { pass: fd.priceToBook < 2, val: 'P/B ' + fd.priceToBook + 'x' };
      /* F3: Dividend Yield */
      if (fd && fd.dividendYield != null) slots[2] = { pass: fd.dividendYield > 1.5, val: 'DIV ' + fd.dividendYield + '%' };
      /* F4: ROA */
      if (fd && fd.roa != null) slots[3] = { pass: fd.roa > 1, val: 'ROA ' + fd.roa + '%' };
    } else {
      /* F1: Revenue CAGR */
      if (r) { var p1 = r.pct > 8; slots[0] = { pass: p1, val: (r.pct >= 0 ? '+' : '') + r.pct + '%' }; }
      /* F2: Valuation PEG/PE */
      if (p) {
        var ep = saneFwd(p) || p.trailingPE;
        if (ep) {
          var peg2 = (r && r.pct > 3) ? +(ep / r.pct).toFixed(2) : null;
          var fcf2 = fd ? fd.fcfYield : null;
          var p2 = peg2 ? peg2 < 2 : ep < 30; if (fcf2 && fcf2 > 3) p2 = true;
          slots[1] = { pass: p2, val: (peg2 ? 'PEG ' + peg2 : 'PE ' + fmtPE(ep)) + (fcf2 != null ? ' · FCF ' + fcf2 + '%' : '') };
        }
      }
      /* F3: Quality GM+ROE */
      if (g || (fd && fd.roe != null)) {
        var p3 = false, v3 = '';
        if (g) { p3 = g.pct > 40; v3 = 'GM ' + g.pct + '%'; }
        if (fd && fd.roe != null) { if (!g) { p3 = fd.roe > 12; v3 = 'ROE ' + fd.roe + '%'; } else { v3 += ' · ROE ' + fd.roe + '%'; if (fd.roe > 12) p3 = true; } }
        slots[2] = { pass: p3, val: v3 };
      }
      /* F4: Debt/EBITDA */
      if (fd && fd.debtEbitda != null) slots[3] = { pass: fd.debtEbitda < 4, val: 'D/E ' + fd.debtEbitda + 'x' };
    }

    /* F5: MA200 momentum (all) */
    if (m) slots[4] = { pass: !m.below || m.pct > -8, val: (m.below ? '' : '+') + m.pct + '% MA200' };
    /* F6: Growth trend (all) */
    if (gt) slots[5] = { pass: !gt.decelerating, val: 'TTM ' + (gt.ttmGrowth >= 0 ? '+' : '') + gt.ttmGrowth + '%' };

    var total = 6;
    var passes = slots.filter(function(f) { return f && f.pass === true; }).length;
    var anyData = slots.some(function(f) { return f !== null; });
    if (!anyData) {
      container.innerHTML = '<span style="color:#f87171;font-size:13px;">לא נמצאו נתונים עבור ' + sym + '</span>';
      return;
    }
    var sc = passes >= total * 0.7 ? '#34d399' : passes >= total * 0.5 ? '#fbbf24' : '#f87171';
    var catLabel = fin
      ? '<span style="font-size:11px;padding:1px 6px;border-radius:3px;background:#1e3a5f;color:#60a5fa;border:1px solid #3b82f640;">🏦 ערך/פיננסי</span>'
      : '<span style="font-size:11px;padding:1px 6px;border-radius:3px;background:#1e2a1a;color:#34d399;border:1px solid #34d39930;">🚀 טק/צמיחה</span>';
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;direction:rtl;';
    row.innerHTML =
      '<span style="font-size:24px;font-weight:800;color:' + sc + ';">' + passes + '/' + total + '</span>' +
      '<span style="font-size:17px;font-weight:700;color:#e2e8f0;">' + sym + '</span>' +
      catLabel +
      '<span style="font-size:13px;color:' + sc + ';">' +
        (passes >= total * 0.7 ? '✅ עובר רוב הפילטרים' : passes >= total * 0.5 ? '⚠️ חלקי' : '❌ לא עובר') + '</span>';
    container.appendChild(row);
    var chips = document.createElement('div');
    chips.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;direction:rtl;';
    slots.forEach(function(f, i) {
      var c = !f ? '#475569' : f.pass ? '#34d399' : '#f87171';
      var chip = document.createElement('span');
      chip.style.cssText = 'padding:2px 8px;border-radius:5px;font-size:12px;font-weight:700;cursor:default;' +
        'color:' + c + ';background:' + c + '18;border:1px solid ' + c + '44;';
      chip.title = f ? f.val : 'אין נתון';
      chip.textContent = (!f ? '— ' : f.pass ? '✓ ' : '✗ ') + SNAMES[i];
      chips.appendChild(chip);
    });
    container.appendChild(chips);
    /* insider callout in screener (informational) */
    if (ins && ins.hasBuys) {
      var iNote = document.createElement('div');
      iNote.style.cssText = 'margin-top:6px;font-size:12px;color:#34d399;';
      iNote.textContent = '👔 רכישת בעלי עניין: ' + (ins.buyCount || 0) + ' קניות ב-6 חודשים אחרונים';
      container.appendChild(iNote);
    }
  }

  function renderAnalysis(panel, ma200Data, peData, revData, gmData, fundData, insiderData, growthData) {
    panel.innerHTML = '';
    var syms = getSymbols();
    if (!syms.length) { panel.innerHTML = '<p style="color:#94a3b8;font-size:16.2px;">אין מניות</p>'; return; }
    fundData = fundData || {};
    insiderData = insiderData || {};
